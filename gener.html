<button id="share-btn" class="btn btn-primary" style="display: none;">게시판에 공유</button>
<button id="share-fab" data-tooltip="게시판에 공유">공유</button>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/js/bootstrap-select.min.js"></script>

<script>
  // --- Constants ---
  const ICON_DEFAULT_PATH = './resources/icon.png';
  
  // --- Global Variables ---
  let baseCard = new Image();
  baseCard.crossOrigin = "anonymous";
  
  let customFlag = new Image();
  customFlag.crossOrigin = "anonymous";
  
  let customClub = new Image(); // 클럽 로고 이미지 추가
  customClub.crossOrigin = "anonymous";
  
  let customSeason = new Image();
  customSeason.crossOrigin = "anonymous";
  
  let customPhoto = new Image();
  customPhoto.crossOrigin = "anonymous";
  
  let customIcon = new Image();
  customIcon.crossOrigin = "anonymous";
  
  let activeImage = null;
  let mode = '';
  let hideHandlesTimeout = null;
  
  const aspectRatios = {
    flag: 1,
    club: 1, // 클럽 로고 비율 추가
    season: 1,
    photo: 1,
    icon: 1
  };
  
  // --- Canvas Setup ---
  const canvas = document.getElementById('cardCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 350;
  canvas.height = 500;
  
  // --- Helper Functions ---
  function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
  }
  
  function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
  }
  
  function getFileName(cardNumber) {
    return `Card ${cardNumber}.png`;
  }
  
  function imageOnLoad(img, key) {
    if (img === baseCard) {
      drawCard();
      hideLoading();
    } else if (key && aspectRatios[key] !== undefined) {
      aspectRatios[key] = img.width / img.height;
      drawCard();
    }
    img.loading = false;
  }
  
  function imageOnError(img, key) {
    console.error(`Failed to load image: ${key}`);
    img.error = true;
    img.loading = false;
    hideLoading();
  }
  
  // --- Dropdown Population Functions ---
  function populateBlankCardDropdown() {
    const select = document.getElementById('blankCardSelect');
    select.innerHTML = '';
    
    // Add blank cards from fcmData
    fcmData.forEach(card => {
      const option = document.createElement('option');
      option.value = `Blank/${getFileName(card.id)}`;
      option.textContent = card.name;
      select.appendChild(option);
    });
    
    // Refresh the selectpicker
    $(select).selectpicker('refresh');
    
    // Set default selection
    $(select).selectpicker('val', `Blank/${getFileName(264)}`);
  }
  
  function populateFlagDropdown() {
    const select = document.getElementById('flagSelect');
    select.innerHTML = '';
    
    // Add empty option
    const emptyOption = document.createElement('option');
    emptyOption.value = '';
    emptyOption.textContent = '국기 없음';
    select.appendChild(emptyOption);
    
    // Add flag options from fcmData
    Object.entries(flagData).forEach(([country, url]) => {
      const option = document.createElement('option');
      option.value = url;
      option.textContent = country;
      option.setAttribute('data-content', `<img src="${url}" width="20" height="20" style="margin-right: 5px;"> ${country}`);
      select.appendChild(option);
    });
    
    // Refresh the selectpicker
    $(select).selectpicker('refresh');
  }
  
  // --- 클럽 로고 그리드 생성 함수 ---
  function populateClubGrids() {
    // 각 리그별 그리드 채우기
    Object.keys(clubsData).forEach(league => {
      const grid = document.getElementById(`${league}-grid`);
      grid.innerHTML = '';
      
      clubsData[league].forEach(club => {
        const clubItem = document.createElement('div');
        clubItem.className = 'club-item';
        clubItem.setAttribute('data-logo', club.logo);
        clubItem.setAttribute('title', club.name);
        
        const img = document.createElement('img');
        img.src = club.logo;
        img.alt = club.name;
        
        clubItem.appendChild(img);
        grid.appendChild(clubItem);
        
        // 클럽 로고 클릭 이벤트
        clubItem.addEventListener('click', function() {
          // 모든 클럽 아이템에서 선택 클래스 제거
          document.querySelectorAll('.club-item').forEach(item => {
            item.classList.remove('selected');
          });
          
          // 현재 클릭한 아이템에 선택 클래스 추가
          this.classList.add('selected');
          
          // 클럽 로고 로드
          loadClubLogo(club.logo);
        });
      });
    });
  }
  
  // --- 클럽 탭 전환 이벤트 설정 ---
  function setupClubTabs() {
    const tabs = document.querySelectorAll('.club-tab');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', function() {
        // 모든 탭에서 active 클래스 제거
        tabs.forEach(t => t.classList.remove('active'));
        
        // 현재 탭에 active 클래스 추가
        this.classList.add('active');
        
        // 모든 콘텐츠 숨기기
        document.querySelectorAll('.club-content').forEach(content => {
          content.classList.remove('active');
        });
        
        // 선택한 리그의 콘텐츠 표시
        const league = this.getAttribute('data-league');
        document.getElementById(`${league}-clubs`).classList.add('active');
      });
    });
  }
  
  function populatePlayerSelectDropdown() {
    const select = document.getElementById('playerSelect');
    select.innerHTML = '';
    
    // Add empty option
    const emptyOption = document.createElement('option');
    emptyOption.value = '';
    emptyOption.textContent = '선수 선택 안함';
    select.appendChild(emptyOption);
    
    // Add player options from faceData
    Object.entries(faceData).forEach(([pid, player]) => {
      const option = document.createElement('option');
      option.value = pid;
      option.textContent = player.name;
      select.appendChild(option);
    });
    
    // Add player options from faceData2
    Object.entries(faceData2).forEach(([pid, player]) => {
      // Skip if already exists in faceData
      if (faceData[pid]) return;
      
      const option = document.createElement('option');
      option.value = pid;
      option.textContent = player.name;
      select.appendChild(option);
    });
    
    // Refresh the selectpicker
    $(select).selectpicker('refresh');
    
    // Add change event listener
    select.addEventListener('change', function() {
      const pid = this.value;
      if (pid) {
        populateFaceVersionDropdown(pid);
        showFaceVersionDropdown();
      } else {
        hideFaceVersionDropdown();
      }
    });
  }
  
  function populateFaceVersionDropdown(pid) {
    const select = document.getElementById('faceVersionSelect');
    select.innerHTML = '';
    
    const player = faceData[pid] || faceData2[pid];
    if (!player) return;
    
    // Add face version options
    Object.entries(player.versions).forEach(([version, url]) => {
      const option = document.createElement('option');
      option.value = url;
      option.textContent = version;
      select.appendChild(option);
    });
    
    // Refresh the selectpicker
    $(select).selectpicker('refresh');
    
    // Select first option and load it
    if (select.options.length > 0) {
      $(select).selectpicker('val', select.options[0].value);
      loadSelectedFaceVersion();
    }
  }
  
  function showFaceVersionDropdown() {
    document.getElementById('faceVersionGroup').style.display = 'block';
  }
  
  function hideFaceVersionDropdown() {
    document.getElementById('faceVersionGroup').style.display = 'none';
  }
  
  // --- Image Loading Functions ---
  function loadBaseCard(path) {
    if (!path) return;
    
    showLoading();
    baseCard.loading = true;
    baseCard.onload = () => imageOnLoad(baseCard, 'base');
    baseCard.onerror = () => imageOnError(baseCard, 'base');
    baseCard.src = path;
  }
  
  function loadSelectedFaceVersion() {
    const url = document.getElementById('faceVersionSelect').value;
    if (!url) return;
    
    showLoading();
    customPhoto.loading = true;
    customPhoto.onload = () => imageOnLoad(customPhoto, 'photo');
    customPhoto.onerror = () => imageOnError(customPhoto, 'photo');
    customPhoto.src = url;
  }
  
  // --- 클럽 로고 로드 함수 ---
  function loadClubLogo(url) {
    if (!url) return;
    
    showLoading();
    customClub.loading = true;
    customClub.onload = () => imageOnLoad(customClub, 'club');
    customClub.onerror = () => imageOnError(customClub, 'club');
    customClub.src = url;
  }
  
  // --- Remove Functions ---
  function removeFlag() {
    customFlag.src = '';
    $('#flagSelect').selectpicker('val', '');
    drawCard();
  }
  
  // 클럽 로고 삭제 함수
  function removeClub() {
    customClub.src = '';
    document.querySelectorAll('.club-item').forEach(item => {
      item.classList.remove('selected');
    });
    drawCard();
  }
  
  function removeSeason() {
    customSeason.src = '';
    document.getElementById('seasonUploadInput').value = '';
    drawCard();
  }
  
  function removePhoto() {
    customPhoto.src = '';
    document.getElementById('photoInput').value = '';
    $('#playerSelect').selectpicker('val', '');
    hideFaceVersionDropdown();
    drawCard();
  }
  
  function removeIcon() {
    customIcon.src = '';
    document.getElementById('iconUploadInput').value = '';
    drawCard();
  }
  
  // --- File Upload Handlers ---
  document.getElementById('seasonUploadInput').addEventListener('change', function(e) {
    if (!e.target.files || !e.target.files[0]) return;
    
    const file = e.target.files[0];
    const reader = new FileReader();
    
    reader.onload = function(event) {
      showLoading();
      customSeason.loading = true;
      customSeason.onload = () => imageOnLoad(customSeason, 'season');
      customSeason.onerror = () => imageOnError(customSeason, 'season');
      customSeason.src = event.target.result;
    };
    
    reader.readAsDataURL(file);
  });
  
  document.getElementById('photoInput').addEventListener('change', function(e) {
    if (!e.target.files || !e.target.files[0]) return;
    
    const file = e.target.files[0];
    const reader = new FileReader();
    
    reader.onload = function(event) {
      showLoading();
      customPhoto.loading = true;
      customPhoto.onload = () => imageOnLoad(customPhoto, 'photo');
      customPhoto.onerror = () => imageOnError(customPhoto, 'photo');
      customPhoto.src = event.target.result;
      
      // Reset player select dropdown
      $('#playerSelect').selectpicker('val', '');
      hideFaceVersionDropdown();
    };
    
    reader.readAsDataURL(file);
  });
  
  document.getElementById('iconUploadInput').addEventListener('change', function(e) {
    if (!e.target.files || !e.target.files[0]) return;
    
    const file = e.target.files[0];
    const reader = new FileReader();
    
    reader.onload = function(event) {
      showLoading();
      customIcon.loading = true;
      customIcon.onload = () => imageOnLoad(customIcon, 'icon');
      customIcon.onerror = () => imageOnError(customIcon, 'icon');
      customIcon.src = event.target.result;
    };
    
    reader.readAsDataURL(file);
  });
  
  // --- Drawing Functions ---
  function drawCard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw base card
    if (baseCard.complete && baseCard.src && !baseCard.error) {
      ctx.drawImage(baseCard, 0, 0, canvas.width, canvas.height);
    }
    
    // Draw icon background if option is selected
    const iconOption = document.getElementById('newOption').value;
    if (iconOption === 'icon' && customIcon.complete && customIcon.src && !customIcon.error) {
      const x = parseInt(document.getElementById('iconX').value) || 20;
      const y = parseInt(document.getElementById('iconY').value) || 20;
      const width = parseInt(document.getElementById('iconWidth').value) || 40;
      const height = parseInt(document.getElementById('iconHeight').value) || 40;
      
      ctx.drawImage(customIcon, x, y, width, height);
    }
    
    // Draw flag if selected
    if (customFlag.complete && customFlag.src && !customFlag.error) {
      const x = parseInt(document.getElementById('flagX').value) || 30;
      const y = parseInt(document.getElementById('flagY').value) || 30;
      const width = parseInt(document.getElementById('flagUploadWidth').value) || 40;
      const height = parseInt(document.getElementById('flagUploadHeight').value) || 40;
      
      ctx.drawImage(customFlag, x, y, width, height);
      
      // Draw resize handles if this image is active
      if (activeImage === customFlag) {
        drawHandles(x, y, width, height);
      }
    }
    
    // 클럽 로고 그리기
    if (customClub.complete && customClub.src && !customClub.error) {
      const x = parseInt(document.getElementById('clubX').value) || 30;
      const y = parseInt(document.getElementById('clubY').value) || 30;
      const width = parseInt(document.getElementById('clubWidth').value) || 40;
      const height = parseInt(document.getElementById('clubHeight').value) || 40;
      
      ctx.drawImage(customClub, x, y, width, height);
      
      // 리사이즈 핸들 그리기
      if (activeImage === customClub) {
        drawHandles(x, y, width, height);
      }
    }
    
    // Draw season icon if uploaded
    if (customSeason.complete && customSeason.src && !customSeason.error) {
      const x = parseInt(document.getElementById('seasonX').value) || 200;
      const y = parseInt(document.getElementById('seasonY').value) || 250;
      const width = parseInt(document.getElementById('seasonUploadWidth').value) || 40;
      const height = parseInt(document.getElementById('seasonUploadHeight').value) || 40;
      
      ctx.drawImage(customSeason, x, y, width, height);
      
      // Draw resize handles if this image is active
      if (activeImage === customSeason) {
        drawHandles(x, y, width, height);
      }
    }
    
    // Draw photo if uploaded or selected
    if (customPhoto.complete && customPhoto.src && !customPhoto.error) {
      const x = parseInt(document.getElementById('photoX').value) || 50;
      const y = parseInt(document.getElementById('photoY').value) || 50;
      const width = parseInt(document.getElementById('photoWidth').value) || 100;
      const height = parseInt(document.getElementById('photoHeight').value) || 100;
      
      ctx.drawImage(customPhoto, x, y, width, height);
      
      // Draw resize handles if this image is active
      if (activeImage === customPhoto) {
        drawHandles(x, y, width, height);
      }
    }
    
    // Draw text elements
    drawTextElements();
    
    // Update PIP preview for mobile
    updatePipPreview();
  }
  
  function drawTextElements() {
    // Draw OVR
    const ovr = document.getElementById('ovr').value || '129';
    const ovrX = parseInt(document.getElementById('ovrX').value) || 88;
    const ovrY = parseInt(document.getElementById('ovrY').value) || 63;
    const ovrFontSize = parseInt(document.getElementById('ovrFontSize').value) || 35;
    const ovrFont = document.getElementById('ovrFont').value || 'FontA';
    const ovrColor = document.getElementById('ovrColor').value || '#FFD700';
    
    ctx.font = `${ovrFontSize}px ${ovrFont}`;
    ctx.fillStyle = ovrColor;
    ctx.textAlign = 'center';
    ctx.fillText(ovr, ovrX, ovrY);
    
    // Draw Position
    const position = document.getElementById('position').value || 'ST';
    const posX = parseInt(document.getElementById('posX').value) || 78;
    const posY = parseInt(document.getElementById('posY').value) || 89;
    const posFontSize = parseInt(document.getElementById('posFontSize').value) || 19;
    const posFont = document.getElementById('posFont').value || 'FontD';
    const posColor = document.getElementById('posColor').value || '#FFFFFF';
    
    ctx.font = `${posFontSize}px ${posFont}`;
    ctx.fillStyle = posColor;
    ctx.textAlign = 'center';
    ctx.fillText(position, posX, posY);
    
    // Draw Player Name
    const playerName = document.getElementById('playerName').value || 'R.레반도프스키';
    const nameX = parseInt(document.getElementById('nameX').value) || 150;
    const nameY = parseInt(document.getElementById('nameY').value) || 218;
    const nameFontSize = parseInt(document.getElementById('nameFontSize').value) || 20;
    const nameFont = document.getElementById('nameFont').value || 'FontC';
    const nameColor = document.getElementById('nameColor').value || '#FFFFFF';
    
    ctx.font = `${nameFontSize}px ${nameFont}`;
    ctx.fillStyle = nameColor;
    ctx.textAlign = 'center';
    ctx.fillText(playerName, nameX, nameY);
  }
  
  function drawHandles(x, y, width, height) {
    const handleSize = 8;
    const halfHandle = handleSize / 2;
    
    // Draw corner handles
    ctx.fillStyle = 'rgba(0, 120, 215, 0.8)';
    ctx.fillRect(x - halfHandle, y - halfHandle, handleSize, handleSize); // Top-left
    ctx.fillRect(x + width - halfHandle, y - halfHandle, handleSize, handleSize); // Top-right
    ctx.fillRect(x - halfHandle, y + height - halfHandle, handleSize, handleSize); // Bottom-left
    ctx.fillRect(x + width - halfHandle, y + height - halfHandle, handleSize, handleSize); // Bottom-right
    
    // Draw center handle for moving
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.fillRect(x + width/2 - halfHandle, y + height/2 - halfHandle, handleSize, handleSize);
  }
  
  function updatePipPreview() {
    const pipPreview = document.getElementById('pipPreview');
    const pipCanvas = document.getElementById('pipCanvas');
    const pipCtx = pipCanvas.getContext('2d');
    
    // Only show PIP on mobile and when scrolled down
    if (window.innerWidth <= 768 && window.scrollY > 100) {
      pipCanvas.width = 120;
      pipCanvas.height = 120;
      pipCtx.clearRect(0, 0, pipCanvas.width, pipCanvas.height);
      
      // Draw a scaled version of the main canvas
      pipCtx.drawImage(canvas, 0, 0, pipCanvas.width, pipCanvas.height);
      
      // Show the preview
      pipPreview.classList.add('show');
    } else {
      // Hide the preview
      pipPreview.classList.remove('show');
    }
  }
  
  // --- Event Listeners ---
  // Flag dropdown change
  document.getElementById('flagSelect').addEventListener('change', function() {
    const flagUrl = this.value;
    if (!flagUrl) {
      removeFlag();
      return;
    }
    
    showLoading();
    customFlag.loading = true;
    customFlag.onload = () => imageOnLoad(customFlag, 'flag');
    customFlag.onerror = () => imageOnError(customFlag, 'flag');
    customFlag.src = flagUrl;
  });
  
  // Blank card dropdown change
  document.getElementById('blankCardSelect').addEventListener('change', function() {
    loadBaseCard(this.value);
  });
  
  // Canvas interaction events
  canvas.addEventListener('pointerdown', function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    
    // Check if clicking on an image or handle
    if (hideHandlesTimeout) {
      clearTimeout(hideHandlesTimeout);
      hideHandlesTimeout = null;
    }
    
    // Function to check if point is inside rectangle
    const isInside = (px, py, rx, ry, rw, rh) => {
      return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
    };
    
    // Function to check if point is near handle
    const isNearHandle = (px, py, hx, hy, handleSize = 8) => {
      const halfHandle = handleSize / 2;
      return isInside(px, py, hx - halfHandle, hy - halfHandle, handleSize, handleSize);
    };
    
    // Check for handle interactions first if an image is active
    if (activeImage) {
      let x1, y1, w, h;
      
      if (activeImage === customFlag) {
        x1 = parseInt(document.getElementById('flagX').value) || 30;
        y1 = parseInt(document.getElementById('flagY').value) || 30;
        w = parseInt(document.getElementById('flagUploadWidth').value) || 40;
        h = parseInt(document.getElementById('flagUploadHeight').value) || 40;
      } else if (activeImage === customClub) { // 클럽 로고 핸들 체크
        x1 = parseInt(document.getElementById('clubX').value) || 30;
        y1 = parseInt(document.getElementById('clubY').value) || 30;
        w = parseInt(document.getElementById('clubWidth').value) || 40;
        h = parseInt(document.getElementById('clubHeight').value) || 40;
      } else if (activeImage === customSeason) {
        x1 = parseInt(document.getElementById('seasonX').value) || 200;
        y1 = parseInt(document.getElementById('seasonY').value) || 250;
        w = parseInt(document.getElementById('seasonUploadWidth').value) || 40;
        h = parseInt(document.getElementById('seasonUploadHeight').value) || 40;
      } else if (activeImage === customPhoto) {
        x1 = parseInt(document.getElementById('photoX').value) || 50;
        y1 = parseInt(document.getElementById('photoY').value) || 50;
        w = parseInt(document.getElementById('photoWidth').value) || 100;
        h = parseInt(document.getElementById('photoHeight').value) || 100;
      } else if (activeImage === customIcon) {
        x1 = parseInt(document.getElementById('iconX').value) || 20;
        y1 = parseInt(document.getElementById('iconY').value) || 20;
        w = parseInt(document.getElementById('iconWidth').value) || 40;
        h = parseInt(document.getElementById('iconHeight').value) || 40;
      }
      
      // Check corner handles
      if (isNearHandle(x, y, x1, y1)) {
        mode = 'resize-tl';
        canvas.style.cursor = 'nwse-resize';
        return;
      } else if (isNearHandle(x, y, x1 + w, y1)) {
        mode = 'resize-tr';
        canvas.style.cursor = 'nesw-resize';
        return;
      } else if (isNearHandle(x, y, x1, y1 + h)) {
        mode = 'resize-bl';
        canvas.style.cursor = 'nesw-resize';
        return;
      } else if (isNearHandle(x, y, x1 + w, y1 + h)) {
        mode = 'resize-br';
        canvas.style.cursor = 'nwse-resize';
        return;
      }
      
      // Check center handle
      if (isNearHandle(x, y, x1 + w/2, y1 + h/2)) {
        mode = 'move';
        canvas.style.cursor = 'move';
        return;
      }
    }
    
    // Check if clicking on images
    let newActiveImage = null;
    
    // Check in reverse order of drawing (top-most first)
    if (customPhoto.complete && customPhoto.src && !customPhoto.error) {
      const photoX = parseInt(document.getElementById('photoX').value) || 50;
      const photoY = parseInt(document.getElementById('photoY').value) || 50;
      const photoWidth = parseInt(document.getElementById('photoWidth').value) || 100;
      const photoHeight = parseInt(document.getElementById('photoHeight').value) || 100;
      
      if (isInside(x, y, photoX, photoY, photoWidth, photoHeight)) {
        newActiveImage = customPhoto;
      }
    }
    
    if (!newActiveImage && customSeason.complete && customSeason.src && !customSeason.error) {
      const seasonX = parseInt(document.getElementById('seasonX').value) || 200;
      const seasonY = parseInt(document.getElementById('seasonY').value) || 250;
      const seasonWidth = parseInt(document.getElementById('seasonUploadWidth').value) || 40;
      const seasonHeight = parseInt(document.getElementById('seasonUploadHeight').value) || 40;
      
      if (isInside(x, y, seasonX, seasonY, seasonWidth, seasonHeight)) {
        newActiveImage = customSeason;
      }
    }
    
    // 클럽 로고 클릭 체크
    if (!newActiveImage && customClub.complete && customClub.src && !customClub.error) {
      const clubX = parseInt(document.getElementById('clubX').value) || 30;
      const clubY = parseInt(document.getElementById('clubY').value) || 30;
      const clubWidth = parseInt(document.getElementById('clubWidth').value) || 40;
      const clubHeight = parseInt(document.getElementById('clubHeight').value) || 40;
      
      if (isInside(x, y, clubX, clubY, clubWidth, clubHeight)) {
        newActiveImage = customClub;
      }
    }
    
    if (!newActiveImage && customFlag.complete && customFlag.src && !customFlag.error) {
      const flagX = parseInt(document.getElementById('flagX').value) || 30;
      const flagY = parseInt(document.getElementById('flagY').value) || 30;
      const flagWidth = parseInt(document.getElementById('flagUploadWidth').value) || 40;
      const flagHeight = parseInt(document.getElementById('flagUploadHeight').value) || 40;
      
      if (isInside(x, y, flagX, flagY, flagWidth, flagHeight)) {
        newActiveImage = customFlag;
      }
    }
    
    if (!newActiveImage && customIcon.complete && customIcon.src && !customIcon.error && document.getElementById('newOption').value === 'icon') {
      const iconX = parseInt(document.getElementById('iconX').value) || 20;
      const iconY = parseInt(document.getElementById('iconY').value) || 20;
      const iconWidth = parseInt(document.getElementById('iconWidth').value) || 40;
      const iconHeight = parseInt(document.getElementById('iconHeight').value) || 40;
      
      if (isInside(x, y, iconX, iconY, iconWidth, iconHeight)) {
        newActiveImage = customIcon;
      }
    }
    
    if (newActiveImage) {
      activeImage = newActiveImage;
      mode = 'move';
      canvas.style.cursor = 'move';
      drawCard(); // Redraw to show handles
    } else {
      activeImage = null;
      mode = '';
      canvas.style.cursor = 'default';
      drawCard(); // Redraw to hide handles
    }
  });
  
  canvas.addEventListener('pointermove', function(e) {
    if (!mode || !activeImage) return;
    
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    
    let xId, yId, widthId, heightId;
    let aspectRatio = 1;
    
    if (activeImage === customFlag) {
      xId = 'flagX';
      yId = 'flagY';
      widthId = 'flagUploadWidth';
      heightId = 'flagUploadHeight';
      aspectRatio = aspectRatios.flag;
    } else if (activeImage === customClub) { // 클럽 로고 이동/리사이즈
      xId = 'clubX';
      yId = 'clubY';
      widthId = 'clubWidth';
      heightId = 'clubHeight';
      aspectRatio = aspectRatios.club;
    } else if (activeImage === customSeason) {
      xId = 'seasonX';
      yId = 'seasonY';
      widthId = 'seasonUploadWidth';
      heightId = 'seasonUploadHeight';
      aspectRatio = aspectRatios.season;
    } else if (activeImage === customPhoto) {
      xId = 'photoX';
      yId = 'photoY';
      widthId = 'photoWidth';
      heightId = 'photoHeight';
      aspectRatio = aspectRatios.photo;
    } else if (activeImage === customIcon) {
      xId = 'iconX';
      yId = 'iconY';
      widthId = 'iconWidth';
      heightId = 'iconHeight';
      aspectRatio = aspectRatios.icon;
    }
    
    const currentX = parseInt(document.getElementById(xId).value) || 0;
    const currentY = parseInt(document.getElementById(yId).value) || 0;
    const currentWidth = parseInt(document.getElementById(widthId).value) || 40;
    const currentHeight = parseInt(document.getElementById(heightId).value) || 40;
    
    if (mode === 'move') {
      document.getElementById(xId).value = Math.max(0, Math.min(canvas.width - currentWidth, x - currentWidth / 2));
      document.getElementById(yId).value = Math.max(0, Math.min(canvas.height - currentHeight, y - currentHeight / 2));
      drawCard();
    } else if (mode.startsWith('resize-')) {
      let newX = currentX, newY = currentY;
      let newWidth = currentWidth, newHeight = currentHeight;
      
      if (mode === 'resize-br') {
        newWidth = Math.max(20, x - currentX);
        newHeight = newWidth / aspectRatio;
      } else if (mode === 'resize-bl') {
        newWidth = Math.max(20, currentX + currentWidth - x);
        newHeight = newWidth / aspectRatio;
        newX = x;
      } else if (mode === 'resize-tr') {
        newWidth = Math.max(20, x - currentX);
        newHeight = newWidth / aspectRatio;
        newY = currentY + currentHeight - newHeight;
      } else if (mode === 'resize-tl') {
        newWidth = Math.max(20, currentX + currentWidth - x);
        newHeight = newWidth / aspectRatio;
        newX = x;
        newY = currentY + currentHeight - newHeight;
      }
      
      // Update input values
      document.getElementById(xId).value = Math.max(0, Math.min(canvas.width - newWidth, newX));
      document.getElementById(yId).value = Math.max(0, Math.min(canvas.height - newHeight, newY));
      document.getElementById(widthId).value = Math.min(canvas.width - newX, newWidth);
      document.getElementById(heightId).value = Math.min(canvas.height - newY, newHeight);
      
      drawCard();
    } else {
      canvas.style.cursor = 'default';
    }
  });
  
  canvas.addEventListener('pointerup', () => {
    mode = '';
    hideHandlesTimeout = setTimeout(() => {
      activeImage = null;
      drawCard();
    }, 1500);
  });
  
  canvas.addEventListener('pointerleave', () => {
    mode = '';
  });

  document.getElementById('jsonLoadInput').addEventListener('change', function(e) {

  function applyCardState(s) {
    activeImage = null;
    mode = '';
    if (hideHandlesTimeout) clearTimeout(hideHandlesTimeout);

    removeFlag();
    removeClub(); // 클럽 로고 초기화
    removeSeason();
    removePhoto();
    removeIcon();

    const originalHandlers = {

      season: { onload: customSeason.onload, onerror: customSeason.onerror },

      icon: { onload: customIcon.onload, onerror: customIcon.onerror }
    };
    
    const checkCompletion = () => {
      imagesToLoadCount--;
      if (imagesToLoadCount <= 0) {
        hideLoading();
        setTimeout(() => {
          baseCard.onload = originalHandlers.base.onload;
          baseCard.onerror = originalHandlers.base.onerror;
          customFlag.onload = originalHandlers.flag.onload;
          customFlag.onerror = originalHandlers.flag.onerror;
          customClub.onload = originalHandlers.club.onload; // 클럽 핸들러 복원

          customSeason.onload = originalHandlers.season.onload;
          customSeason.onerror = originalHandlers.season.onerror;
          customPhoto.onload = originalHandlers.photo.onload;
          customPhoto.onerror = originalHandlers.photo.onerror;
          customIcon.onload = originalHandlers.icon.onload;
          customIcon.onerror = originalHandlers.icon.onerror;
        }, 0);
        drawCard();
      }
    };
    
    const createLoadHandler = (img, key) => () => {
      imageOnLoad(img, key);
      checkCompletion();
    };
    
    const createErrorHandler = (img, key) => () => {
      imageOnError(img, key);
      checkCompletion();
    };
    
    const startImageLoad = (imgElement, src, key) => {
      if (src) {
        imagesToLoadCount++;
        imgElement.error = false;
        imgElement.loading = true;
        imgElement.onload = createLoadHandler(imgElement, key);
        imgElement.onerror = createErrorHandler(imgElement, key);
        imgElement.src = src;
        return true;
      }
      return false;
    };
    
    document.getElementById('cardTitleInput').value = s.cardTitle || '';
    
    const blankCardPath = s.blankCard || `Blank/${getFileName(264)}`;

    if ($('#blankCardSelect').val() === blankCardPath) {

      startImageLoad(baseCard, blankCardPath, 'base');

      console.warn("Saved blank card path invalid:", blankCardPath);
      $('#blankCardSelect').selectpicker('val', `Blank/${getFileName(264)}`);

      startImageLoad(baseCard, `Blank/${getFileName(264)}`, 'base');

    const applyCoords = (stateObj, defX, defY, defW, defH, xId, yId, wId, hId) => {

    // 클럽 로고 상태 적용

    if (imagesToLoadCount === 0) {
      hideLoading();

      customFlag.onload = originalHandlers.flag.onload;

      customClub.onload = originalHandlers.club.onload; // 클럽 핸들러 복원

      customSeason.onerror = originalHandlers.season.onerror;
      customPhoto.onload = originalHandlers.photo.onload;

  // --- Initial Setup ---

      el.addEventListener('change', drawCard);
    });
    
    // Add listener for the face version dropdown change

      const optionValue = document.getElementById('newOption').value;

        showLoading();

        customIcon.src = ICON_DEFAULT_PATH;

        drawCard();
      }
    });
    
    // Preload icon
    const tempIconLoader = new Image();
    tempIconLoader.crossOrigin = "anonymous";
    tempIconLoader.onload = () => {
      if (tempIconLoader.width > 0 && tempIconLoader.height > 0) {
        aspectRatios.icon = tempIconLoader.width / tempIconLoader.height;
        if (document.getElementById('newOption').value === 'icon' && !customIcon.src && !customIcon.error && !customIcon.loading) {
          showLoading();
          customIcon.loading = true;
          customIcon.src = ICON_DEFAULT_PATH;
        }
      } else {
        console.error("Preloaded icon.png invalid dimensions.");
      }
    };
    tempIconLoader.onerror = () => {
      console.error("Failed to preload icon.png");
    };
    tempIconLoader.src = ICON_DEFAULT_PATH;
    
    // Safety timeout
    setTimeout(() => {
      if (document.getElementById('loadingOverlay').style.display === 'flex') {
        hideLoading();
        console.warn("Loading overlay forced hide (timeout).");
        if (!baseCard.complete || !baseCard.src) drawCard();
      }
    }, 20000);
  });

<script type="module">
  try {
    // Adjust path if firebase.js is not in the same directory
    const { db, collection, addDoc } = await import('./firebase.js');
    
    const shareBtn = document.getElementById('share-btn');
    let isSharing = false; // Prevent double clicks
    
    shareBtn.addEventListener('click', async () => {
      if (isSharing) return;
      
      // Rate limiting (1 share per minute)
      const lastShareTime = localStorage.getItem('lastShareTime');
      const sixtySeconds = 60 * 1000;
      if (lastShareTime && (Date.now() - lastShareTime < sixtySeconds)) {
        alert(`공유는 1분에 한 번만 가능합니다. 잠시 후에 다시 시도해 주세요.`);
        return;
      }
      
      // Check for title
      const title = document.getElementById('cardTitleInput').value.trim();
      if (!title) {
        alert('공유할 카드의 제목을 입력해주세요!');
        document.getElementById('cardTitleInput').focus();
        return;
      }
      
      // Confirmation dialog
      if (!confirm(`'${title}' 카드를 게시판에 공유하시겠습니까?`)) {
        return;
      }
      
      // --- Start Sharing Process ---
      isSharing = true;
      shareBtn.disabled = true;
      const originalText = shareBtn.textContent;
      shareBtn.textContent = '공유 중...';
      shareBtn.classList.add('disabled'); // Visual feedback
      
      // Temporarily hide handles for capture
      const tmpActive = activeImage;
      const tmpMode = mode;
      if (hideHandlesTimeout) {
        clearTimeout(hideHandlesTimeout);
        hideHandlesTimeout = null;
      }
      activeImage = null;
      mode = '';
      drawCard(); // Redraw without handles
      
      // Use setTimeout to allow canvas redraw before capturing
      setTimeout(async () => {
        let imageUrl = '';
        try {
          const canvasElem = document.getElementById('cardCanvas');
          imageUrl = canvasElem.toDataURL('image/png'); // Capture canvas as PNG
        } catch (captureError) {
          console.error('Canvas capture error:', captureError);
          alert('이미지 생성 중 오류가 발생했습니다. 다시 시도해 주세요.\n(타사 이미지 사용 시 CORS 오류일 수 있습니다)');
          // Restore UI and re-enable button even on capture failure
          activeImage = tmpActive;
          mode = tmpMode;
          drawCard(); // Redraw with potential handles
          isSharing = false;
          shareBtn.disabled = false;
          shareBtn.textContent = originalText;
          shareBtn.classList.remove('disabled');
          return; // Stop execution
        }
        
        try {
          // Prepare card data
          const cardData = {
            title: title,
            imageUrl: imageUrl, // Base64 image data
            createdAt: new Date(),
            // Add any other metadata you want to store
          };
          
          // Add to Firestore
          const docRef = await addDoc(collection(db, "cards"), cardData);
          console.log("Card shared with ID: ", docRef.id);
          
          // Update rate limiting
          localStorage.setItem('lastShareTime', Date.now().toString());
          
          // Success message
          alert('카드가 성공적으로 공유되었습니다!');
          
          // Redirect to board page
          window.location.href = 'card-board.html';
        } catch (error) {
          console.error("Error sharing card: ", error);
          alert('카드 공유 중 오류가 발생했습니다. 다시 시도해 주세요.');
          
          // Restore UI
          activeImage = tmpActive;
          mode = tmpMode;
          drawCard();
        } finally {
          // Re-enable button
          isSharing = false;
          shareBtn.disabled = false;
          shareBtn.textContent = originalText;
          shareBtn.classList.remove('disabled');
        }
      }, 100);
    });
    
    // Connect share-fab to share-btn
    document.getElementById('share-fab').addEventListener('click', () => {
      document.getElementById('share-btn').click();
    });
  } catch (error) {
    console.error("Firebase module error:", error);
    // Hide share buttons if Firebase is not available
    document.getElementById('share-btn').style.display = 'none';
    document.getElementById('share-fab').style.display = 'none';
  }
</script>
</body>
</html>
