<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge"> 
  <!-- 검색 엔진 최적화 (SEO) -->
  <meta name="description" content="유로 빈카드, 토티 빈카드, 센츄리온 빈카드, 트로피 아이콘 빈카드, 월드컵 빈카드, 발롱도르 빈카드">
  <meta name="keywords" content="FC모바일, 특성 재료, 패스 마스터, 라인 브레이커, 예리한 감아차기, 선수 정보, 오버롤, 넥슨, 빈카드, 합성, 카드 제작, 카드, 제작">
  <meta name="author" content="해리지팡이">
  
  <!-- Open Graph 데이터 -->
  <meta property="og:title" content="피모 합성소">
  <meta property="og:description" content="FC모바일 합성 툴!: 다양한 빈카드와 카드 제작 툴을 만나보세요!">
  <meta property="og:image" content="https://kritikal619.github.io/logo/Favicon.png">
  <meta property="og:url" content="https://kritikal619.github.io/trait/">
  <meta property="og:site_name" content="FC모바일 카드 합성 툴">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="styles.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./favicons/favicon.svg" />
  <link rel="shortcut icon" href="./favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./favicons/apple-touch-icon.png" />

  <title>FC모바일 카드 제작기</title>
  <h3>**모바일에서는 가로로 이용해 주세요**</h3>
  <style>
    /* 프로젝트의 fonts 폴더에 있는 3종 폰트 불러오기 */
    @font-face {
      font-family: 'FontA';
      src: url('fonts/FontA.otf') format('opentype');
    }
    @font-face {
      font-family: 'FontB';
      src: url('fonts/FontB.otf') format('opentype');
    }
    @font-face {
      font-family: 'FontC';
      src: url('fonts/FontC.otf') format('opentype');
    }
    
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    .container {
      display: flex;
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* 왼쪽 에디터 영역: 스크롤되도록 */
    .editor {
      width: 350px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .preview {
      flex-grow: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      position: sticky;
      top: 20px;
      align-self: flex-start;
    }
    canvas {
      border: 2px solid #ddd;
      margin-top: 10px;
      background: white;
      cursor: default;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 5px;
    }
    .coord-inputs {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }
    .coord-inputs input {
      width: 70px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    #wrap {
      display: block;
      background-color: #f2f2f2;
    }
    footer {
      width: 100%;
      height: 90px;
      border-top: 1px solid #c4c4c4;
      padding-top: 15px;
      color: #808080;
      font-size: 11px;
      background-color: #f2f2f2;
    }
    footer a {
      display: inline-block;
      margin: 0 20px 10px 20px;
      color: #808080;
      font-size: 11px;
    }
    footer a:visited {
      color: #808080;
    }
    footer p {
      margin-top: 0;
      margin-bottom: 0;
    }
    footer p span {
      display: inline-block;
      margin-left: 20px;
    }
    /* 빈카드 썸네일 목록 그리드 */
    #blankCardsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 15px;
      border: 1px solid #ddd;
      padding: 10px;
      background: #fafafa;
    }
    #blankCardsContainer img {
      width: 100%;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 4px;
    }
    #blankCardsContainer img.selected {
      border-color: #007bff;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 에디터 영역 -->
    <div class="editor">
      <h2>카드 제작기</h2>
      
      <!-- 빈카드 선택 및 미리보기 -->
      <div class="form-group">
        <label>빈카드 선택</label>
        <select id="cardSelector" class="form-control"></select>
        <img id="cardDesignPreview" src="" style="width:100px; display:block; margin-top:10px;">
      </div>
      
      <!-- 모든 빈카드 썸네일 목록 -->
      <div class="form-group">
        <label>모든 빈카드 미리보기</label>
        <div id="blankCardsContainer"></div>
      </div>
      
      <!-- 오버롤 입력 -->
      <div class="form-group">
        <label>오버롤</label>
        <input type="number" id="ovr" min="0" max="99" value="85">
        <div class="coord-inputs">
          <input type="number" id="ovrX" placeholder="X" value="74">
          <input type="number" id="ovrY" placeholder="Y" value="74">
        </div>
        <label>오버롤 폰트 크기</label>
        <input type="number" id="ovrFontSize" placeholder="Font Size" value="32">
        <label>오버롤 폰트</label>
        <select id="ovrFont">
          <option value="FontA">FontA</option>
          <option value="FontB" selected>FontB</option>
          <option value="FontC">FontC</option>
        </select>
        <label>오버롤 폰트 색상</label>
        <input type="color" id="ovrColor" value="#FFD700">
      </div>
      
      <!-- 포지션 입력 -->
      <div class="form-group">
        <label>포지션</label>
        <select id="position">
          <option value="LW">LW</option>
          <option value="ST">ST</option>
          <option value="RW">RW</option>
          <option value="CF">CF</option>
          <option value="LF">LF</option>
          <option value="RF">RF</option>
          <option value="CM">CM</option>
          <option value="RM">RM</option>
          <option value="LM">LM</option>
          <option value="CDM">CDM</option>
          <option value="CAM">CAM</option>
          <option value="LB">LB</option>
          <option value="CB">CB</option>
          <option value="RB">RB</option>
          <option value="GK">GK</option>
        </select>
        <div class="coord-inputs">
          <input type="number" id="posX" placeholder="X" value="76">
          <input type="number" id="posY" placeholder="Y" value="102">
        </div>
        <label>포지션 폰트</label>
        <select id="posFont">
          <option value="FontA">FontA</option>
          <option value="FontB" selected>FontB</option>
          <option value="FontC">FontC</option>
        </select>
        <label>포지션 폰트 크기</label>
        <input type="number" id="posFontSize" placeholder="Font Size" value="19">
        <label>포지션 폰트 색상</label>
        <input type="color" id="posColor" value="#FFFFFF">
      </div>
      
      <!-- 선수 이름 입력 -->
      <div class="form-group">
        <label>선수 이름</label>
        <input type="text" id="playerName" value="김민재">
        <div class="coord-inputs">
          <input type="number" id="nameX" placeholder="X" value="121">
          <input type="number" id="nameY" placeholder="Y" value="218">
        </div>
        <label>이름 폰트</label>
        <select id="nameFont">
          <option value="FontA">FontA</option>
          <option value="FontB">FontB</option>
          <option value="FontC" selected>FontC</option>
        </select>
        <label>이름 폰트 크기</label>
        <input type="number" id="nameFontSize" placeholder="Font Size" value="20">
        <label>Name Color</label>
        <input type="color" id="nameColor" value="#FFFFFF">
      </div>
      
      <!-- (추가 사진, 국기, 시즌 등 다른 입력 요소 추가 가능) -->
      <button onclick="downloadCard()">Download Card</button>
    </div>
    
    <!-- 미리보기 영역 -->
    <div class="preview">
      <h2>카드 미리보기</h2>
      <canvas id="cardCanvas" width="300" height="300"></canvas>
      <div id="wrap">
        <section></section>
        <footer>
          <p>
            <span>Data based on NEXON</span><br/>
            <span>이메일 :<span id="email">jchae0619@gmail.com</span></span>
            <span>© 2025 kritikal619. All Rights Reserved.</span>
          </p>
        </footer>
      </div>
    </div>
  </div>
  
  <script>
    // --- 기본 이미지 및 옵션 변수 ---
    const totalImages = 250;
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    
    // 기본 이미지 객체들
    let baseCard = new Image();
    let classImage = new Image();
    
    // 업로드된 국기, 시즌, 추가 사진용 이미지 객체
    let customFlag = new Image();
    let customSeason = new Image();
    let customPhoto = new Image();
    
    // --- 드래그 및 리사이즈 관련 변수 ---
    let photoX = 50, photoY = 50;
    let draggingPhoto = false, photoDragOffsetX = 0, photoDragOffsetY = 0;
    let resizingPhoto = false, photoResizeOffsetX = 0, photoResizeOffsetY = 0;
    let customFlagX = 30, customFlagY = 30;
    let draggingCustomFlag = false, customFlagDragOffsetX = 0, customFlagDragOffsetY = 0;
    let resizingCustomFlag = false, customFlagResizeOffsetX = 0, customFlagResizeOffsetY = 0;
    let customSeasonX = 200, customSeasonY = 250;
    let draggingCustomSeason = false, customSeasonDragOffsetX = 0, customSeasonDragOffsetY = 0;
    let resizingCustomSeason = false, customSeasonResizeOffsetX = 0, customSeasonResizeOffsetY = 0;
    
    // --- 빈카드 및 클래스 이미지 선택 박스 채우기 ---
    function getFileName(number) {
      return `image(${number}).png`;
    }
    function populateSelectors() {
      const cardSelector = document.getElementById('cardSelector');
      // 2부터 totalImages까지 짝수 번호 사용
      for (let i = 2; i <= totalImages; i += 2) {
        let option = document.createElement('option');
        option.value = getFileName(i);
        option.textContent = `Card ${i}`;
        cardSelector.appendChild(option);
      }
    }
    
    // --- 빈카드 썸네일 목록 채우기 ---
    function populateBlankCards() {
      const container = document.getElementById('blankCardsContainer');
      container.innerHTML = '';
      for (let i = 2; i <= totalImages; i += 2) {
        const img = document.createElement('img');
        img.src = `Blank/${getFileName(i)}`;
        img.alt = `Card ${i}`;
        img.dataset.cardValue = getFileName(i);
        img.addEventListener('click', function() {
          document.getElementById('cardSelector').value = this.dataset.cardValue;
          loadBaseCard();
          document.querySelectorAll('#blankCardsContainer img').forEach(el => el.classList.remove('selected'));
          this.classList.add('selected');
        });
        container.appendChild(img);
      }
    }
    
    // --- 이미지 로드 함수 ---
    function loadBaseCard() {
      const cardFile = document.getElementById('cardSelector').value;
      baseCard.src = `Blank/${cardFile}`;
      baseCard.onload = () => {
        document.getElementById('cardDesignPreview').src = baseCard.src;
        drawCard();
      };
    }
    function loadClassImage() {
      const classFile = document.getElementById('classSelector')?.value;
      if(classFile) {
        classImage.src = `Class/${classFile}`;
        classImage.onload = drawCard;
      }
    }
    
    // --- 국기, 시즌, 추가 사진 업로드 처리 ---
    document.getElementById('flagUploadInput')?.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          customFlag.src = evt.target.result;
          customFlagX = 30; customFlagY = 30;
          customFlag.onload = drawCard;
        }
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('seasonUploadInput')?.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          customSeason.src = evt.target.result;
          customSeasonX = 200; customSeasonY = 250;
          customSeason.onload = drawCard;
        }
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('photoInput')?.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          customPhoto.src = evt.target.result;
          photoX = 50; photoY = 50;
          customPhoto.onload = drawCard;
        }
        reader.readAsDataURL(file);
      }
    });
    
    // --- 캔버스 내 마우스 이벤트 (드래그/리사이즈) ---
    canvas.addEventListener('mousedown', function(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const photoW = parseInt(document.getElementById('photoWidth')?.value) || 100;
      const photoH = parseInt(document.getElementById('photoHeight')?.value) || 100;
      if(customPhoto.complete && customPhoto.src) {
        if(mouseX >= photoX + photoW - 10 && mouseX <= photoX + photoW + 10 &&
           mouseY >= photoY + photoH - 10 && mouseY <= photoY + photoH + 10) {
          resizingPhoto = true;
          photoResizeOffsetX = (photoX + photoW) - mouseX;
          photoResizeOffsetY = (photoY + photoH) - mouseY;
          return;
        }
      }
      if(customPhoto.complete && customPhoto.src) {
        if(mouseX >= photoX && mouseX <= photoX + photoW &&
           mouseY >= photoY && mouseY <= photoY + photoH) {
          draggingPhoto = true;
          photoDragOffsetX = mouseX - photoX;
          photoDragOffsetY = mouseY - photoY;
          return;
        }
      }
      const flagW = parseInt(document.getElementById('flagUploadWidth')?.value) || 40;
      const flagH = parseInt(document.getElementById('flagUploadHeight')?.value) || 30;
      if(customFlag.complete && customFlag.src) {
        if(mouseX >= customFlagX + flagW - 10 && mouseX <= customFlagX + flagW + 10 &&
           mouseY >= customFlagY + flagH - 10 && mouseY <= customFlagY + flagH + 10) {
          resizingCustomFlag = true;
          customFlagResizeOffsetX = (customFlagX + flagW) - mouseX;
          customFlagResizeOffsetY = (customFlagY + flagH) - mouseY;
          return;
        }
        if(mouseX >= customFlagX && mouseX <= customFlagX + flagW &&
           mouseY >= customFlagY && mouseY <= customFlagY + flagH) {
          draggingCustomFlag = true;
          customFlagDragOffsetX = mouseX - customFlagX;
          customFlagDragOffsetY = mouseY - customFlagY;
          return;
        }
      }
      const seasonW = parseInt(document.getElementById('seasonUploadWidth')?.value) || 80;
      const seasonH = parseInt(document.getElementById('seasonUploadHeight')?.value) || 40;
      if(customSeason.complete && customSeason.src) {
        if(mouseX >= customSeasonX + seasonW - 10 && mouseX <= customSeasonX + seasonW + 10 &&
           mouseY >= customSeasonY + seasonH - 10 && mouseY <= customSeasonY + seasonH + 10) {
          resizingCustomSeason = true;
          customSeasonResizeOffsetX = (customSeasonX + seasonW) - mouseX;
          customSeasonResizeOffsetY = (customSeasonY + seasonH) - mouseY;
          return;
        }
        if(mouseX >= customSeasonX && mouseX <= customSeasonX + seasonW &&
           mouseY >= customSeasonY && mouseY <= customSeasonY + seasonH) {
          draggingCustomSeason = true;
          customSeasonDragOffsetX = mouseX - customSeasonX;
          customSeasonDragOffsetY = mouseY - customSeasonY;
          return;
        }
      }
    });
    
    canvas.addEventListener('mousemove', function(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      if(resizingPhoto) {
        let newWidth = mouseX - photoX + photoResizeOffsetX;
        let newHeight = mouseY - photoY + photoResizeOffsetY;
        if(newWidth < 10) newWidth = 10;
        if(newHeight < 10) newHeight = 10;
        if(document.getElementById('photoWidth')) document.getElementById('photoWidth').value = newWidth;
        if(document.getElementById('photoHeight')) document.getElementById('photoHeight').value = newHeight;
        drawCard();
      } else if(draggingPhoto) {
        photoX = mouseX - photoDragOffsetX;
        photoY = mouseY - photoDragOffsetY;
        drawCard();
      } else if(resizingCustomFlag) {
        let newWidth = mouseX - customFlagX + customFlagResizeOffsetX;
        let newHeight = mouseY - customFlagY + customFlagResizeOffsetY;
        if(newWidth < 10) newWidth = 10;
        if(newHeight < 10) newHeight = 10;
        if(document.getElementById('flagUploadWidth')) document.getElementById('flagUploadWidth').value = newWidth;
        if(document.getElementById('flagUploadHeight')) document.getElementById('flagUploadHeight').value = newHeight;
        drawCard();
      } else if(draggingCustomFlag) {
        customFlagX = mouseX - customFlagDragOffsetX;
        customFlagY = mouseY - customFlagDragOffsetY;
        drawCard();
      } else if(resizingCustomSeason) {
        let newWidth = mouseX - customSeasonX + customSeasonResizeOffsetX;
        let newHeight = mouseY - customSeasonY + customSeasonResizeOffsetY;
        if(newWidth < 10) newWidth = 10;
        if(newHeight < 10) newHeight = 10;
        if(document.getElementById('seasonUploadWidth')) document.getElementById('seasonUploadWidth').value = newWidth;
        if(document.getElementById('seasonUploadHeight')) document.getElementById('seasonUploadHeight').value = newHeight;
        drawCard();
      } else if(draggingCustomSeason) {
        customSeasonX = mouseX - customSeasonDragOffsetX;
        customSeasonY = mouseY - customSeasonDragOffsetY;
        drawCard();
      }
    });
    
    canvas.addEventListener('mouseup', function() {
      resizingPhoto = false;
      draggingPhoto = false;
      resizingCustomFlag = false;
      draggingCustomFlag = false;
      resizingCustomSeason = false;
      draggingCustomSeason = false;
    });
    canvas.addEventListener('mouseleave', function() {
      resizingPhoto = false;
      draggingPhoto = false;
      resizingCustomFlag = false;
      draggingCustomFlag = false;
      resizingCustomSeason = false;
      draggingCustomSeason = false;
    });
    
    // --- 카드 그리기 ---
    function drawCard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Base Card 그리기
      if(baseCard.complete) {
        ctx.drawImage(baseCard, 0, 0, canvas.width, canvas.height);
      }
      // 오버롤 그리기
      const ovrFontSize = document.getElementById('ovrFontSize').value;
      const ovrFont = document.getElementById('ovrFont').value;
      ctx.fillStyle = document.getElementById('ovrColor').value;
      ctx.font = `bold ${ovrFontSize}px ${ovrFont}`;
      ctx.fillText(document.getElementById('ovr').value,
                   parseInt(document.getElementById('ovrX').value),
                   parseInt(document.getElementById('ovrY').value));
      // 포지션 그리기
      const posFontSize = document.getElementById('posFontSize').value;
      const posFont = document.getElementById('posFont').value;
      ctx.fillStyle = document.getElementById('posColor').value;
      ctx.font = `bold ${posFontSize}px ${posFont}`;
      ctx.fillText(document.getElementById('position').value,
                   parseInt(document.getElementById('posX').value),
                   parseInt(document.getElementById('posY').value));
      // 선수 이름 그리기
      const nameFontSize = document.getElementById('nameFontSize').value;
      const nameFont = document.getElementById('nameFont').value;
      ctx.fillStyle = document.getElementById('nameColor').value;
      ctx.font = `${nameFontSize}px ${nameFont}`;
      ctx.fillText(document.getElementById('playerName').value,
                   parseInt(document.getElementById('nameX').value),
                   parseInt(document.getElementById('nameY').value));
      // 업로드 국기 그리기
      if(customFlag.complete && customFlag.src) {
        const flagW = parseInt(document.getElementById('flagUploadWidth').value);
        const flagH = parseInt(document.getElementById('flagUploadHeight').value);
        ctx.drawImage(customFlag, customFlagX, customFlagY, flagW, flagH);
      }
      // 업로드 시즌 그리기
      if(customSeason.complete && customSeason.src) {
        const seasonW = parseInt(document.getElementById('seasonUploadWidth').value);
        const seasonH = parseInt(document.getElementById('seasonUploadHeight').value);
        ctx.drawImage(customSeason, customSeasonX, customSeasonY, seasonW, seasonH);
      }
      // Class Image 그리기 (존재하는 경우)
      if(classImage.complete) {
        ctx.drawImage(classImage,
          parseInt(document.getElementById('classX')?.value) || 0,
          parseInt(document.getElementById('classY')?.value) || 0,
          parseInt(document.getElementById('classWidth')?.value) || 0,
          parseInt(document.getElementById('classHeight')?.value) || 0);
      }
      // 추가 사진 그리기
      if(customPhoto.complete && customPhoto.src) {
        const photoW = parseInt(document.getElementById('photoWidth')?.value) || 100;
        const photoH = parseInt(document.getElementById('photoHeight')?.value) || 100;
        ctx.drawImage(customPhoto, photoX, photoY, photoW, photoH);
      }
    }
    
    // --- 다운로드 ---
    function downloadCard() {
      const link = document.createElement('a');
      link.download = 'kfc-card.png';
      link.href = canvas.toDataURL();
      link.click();
    }
    
    // --- 이벤트 리스너 등록 ---
    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('input', drawCard);
    });
    document.getElementById('cardSelector').addEventListener('change', loadBaseCard);
    document.getElementById('classSelector')?.addEventListener('change', loadClassImage);
    
    // --- 초기 설정 ---
    populateSelectors();
    populateBlankCards();
    loadBaseCard();
    loadClassImage();
  </script>
</body>
