  <script>
    // -------------------------------
    // 캔버스 초기화 & 드로잉 로직
    // -------------------------------
      const pipPreview = document.getElementById('pipPreview');
      let pipFadeTimeout;

  // PIP 보여주기 + 자동 페이드아웃 함수
      function showPip() {
        pipPreview.classList.add('show');
        clearTimeout(pipFadeTimeout);
        pipFadeTimeout = setTimeout(() => {
      pipPreview.classList.remove('show');
    }, 2000); // 2초 후 페이드아웃
  }
  
    const totalImages = 264;
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    let cardFileName = "card";
    const pipCanvas = document.getElementById('pipCanvas');
    const pipCtx = pipCanvas.getContext('2d');

    let canvasWidth = 300;
    let canvasHeight = 300;
    if (window.innerWidth < 768) {
      canvasWidth = Math.floor(window.innerWidth * 0.8);
      canvasHeight = Math.floor(window.innerWidth * 0.8);
    }
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    pipCanvas.width = canvasWidth;
    pipCanvas.height = canvasHeight;

    function showLoading() {
      document.getElementById('loadingOverlay').style.display = "flex";
    }
    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = "none";
    }

    let baseCard = new Image(); baseCard.crossOrigin = "anonymous";
    let customFlag = new Image(); customFlag.crossOrigin = "anonymous";
    let customSeason = new Image(); customSeason.crossOrigin = "anonymous";
    let customPhoto = new Image(); customPhoto.crossOrigin = "anonymous";
    let customIcon = new Image(); customIcon.crossOrigin = "anonymous";

    // Store aspect ratios for images
    const aspectRatios = {}; // { flag: ratio, season: ratio, photo: ratio, icon: ratio }

    // Modify image onload handlers to store aspect ratio
    const imageOnLoad = function(img, aspectRatioKey) {
        hideLoading();
        if (img.width > 0 && img.height > 0) {
            aspectRatios[aspectRatioKey] = img.width / img.height;
        } else {
            aspectRatios[aspectRatioKey] = undefined; // Clear if dimensions are zero or invalid
        }
        drawCard();
    };
     const imageOnError = function(aspectRatioKey) {
        console.error(`Failed to load image for ${aspectRatioKey}`);
        // imgElement.src = ""; // No need to clear src here, handled in drawCard if dimensions invalid
        aspectRatios[aspectRatioKey] = undefined;
        hideLoading();
        drawCard();
     };

    customFlag.onload = () => imageOnLoad(customFlag, 'flag'); customFlag.onerror = () => imageOnError('flag');
    customSeason.onload = () => imageOnLoad(customSeason, 'season'); customSeason.onerror = () => imageOnError('season');
    customPhoto.onload = () => imageOnLoad(customPhoto, 'photo'); customPhoto.onerror = () => imageOnError('photo');
    customIcon.onload = () => imageOnLoad(customIcon, 'icon'); customIcon.onerror = () => imageOnError('icon');


    function getFileName(number) {
      return `image(${number}).png`;
    }

    function populateBlankCardDropdown() {
      const select = document.getElementById('blankCardSelect');
      select.innerHTML = '';
      for (let i = 1; i <= totalImages; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.setAttribute(
          'data-content',
          `<img src="Blank/${getFileName(i)}" style="width:30px;height:auto;vertical-align:middle;"> Card ${i}`
        );
        if (i === 264) option.selected = true;
        select.appendChild(option);
      }
      $('.selectpicker').selectpicker('refresh');

      select.addEventListener('change', function() {
        const cardNum = select.value;
        showLoading();
        baseCard.src = `Blank/${getFileName(cardNum)}`;
        // onload handler is already defined for baseCard
      });
    }

    function loadBaseCard() {
      showLoading();
      baseCard.src = `Blank/${getFileName(264)}`;
      baseCard.onload = function() { // baseCard doesn't need aspect ratio stored
        hideLoading();
        drawCard();
      };
       baseCard.onerror = function() {
         console.error("Failed to load base card");
         hideLoading();
         drawCard();
       };
    }

    document.getElementById('flagUploadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        showLoading();
        const reader = new FileReader();
        reader.onload = function(evt) {
          customFlag.src = evt.target.result; // onload handler will handle drawCard and aspect ratio
        };
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('seasonUploadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        showLoading();
        const reader = new FileReader();
        reader.onload = function(evt) {
          customSeason.src = evt.target.result; // onload handler will handle drawCard and aspect ratio
        };

    let activeImage=null, mode='', offsetX=0, offsetY=0;

    let hideHandlesTimeout = null; // Variable to store timeout ID

    canvas.addEventListener('pointerdown', e=>{
      // Clear the previous timeout if it exists
      if (hideHandlesTimeout) {
        clearTimeout(hideHandlesTimeout);
        hideHandlesTimeout = null;
      }

      e.preventDefault(); canvas.setPointerCapture(e.pointerId);
      const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
      const check=(img,getP)=>{
        if(img.complete&&img.src && img.width > 0 && img.height > 0){ // Ensure image is loaded and valid
          const p=getP();
          // Add a larger hit area for the resize handle
          const resizeHandleHitArea = 15; // Increased hit area
          if(mx>=p.x+p.width-resizeHandleHitArea&&mx<=p.x+p.width+resizeHandleHitArea&&my>=p.y+p.height-resizeHandleHitArea&&my<=p.y+p.height+resizeHandleHitArea){
            activeImage=p.name; mode='resize'; offsetX=(p.x+p.width)-mx; offsetY=(p.y+p.height)-my; drawCard(); return true; // Draw immediately on activation
          }
          if(mx>=p.x&&mx<=p.x+p.width&&my>=p.y&&my<=p.y+p.height){
            activeImage=p.name; mode='drag'; offsetX=mx-p.x; offsetY=my-p.y; drawCard(); return true; // Draw immediately on activation
          }
        }
        return false;
      };
      if(check(customFlag,()=>({ x:+document.getElementById('flagX').value, y:+document.getElementById('flagY').value, width:+document.getElementById('flagUploadWidth').value, height:+document.getElementById('flagUploadHeight').value, name:'flag' }))) return;

    canvas.addEventListener('pointermove', e=>{
      if(!activeImage || !mode) return; // Ensure mode is set
      e.preventDefault();
      const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
      let xE,yE,wE,hE;
      let currentX, currentY; // Store current position before update

      switch(activeImage){
        case 'flag':
           xE=document.getElementById('flagX'); yE=document.getElementById('flagY'); wE=document.getElementById('flagUploadWidth'); hE=document.getElementById('flagUploadHeight');
           currentX = +xE.value; currentY = +yE.value;
           break;
        case 'season':
           xE=document.getElementById('seasonX'); yE=document.getElementById('seasonY'); wE=document.getElementById('seasonUploadWidth'); hE=document.getElementById('seasonUploadHeight');
           currentX = +xE.value; currentY = +yE.value;
           break;
        case 'photo':
           xE=document.getElementById('photoX'); yE=document.getElementById('photoY'); wE=document.getElementById('photoWidth'); hE=document.getElementById('photoHeight');
           currentX = +xE.value; currentY = +yE.value;
           break;
        case 'icon':
           xE=document.getElementById('iconX'); yE=document.getElementById('iconY'); wE=document.getElementById('iconWidth'); hE=document.getElementById('iconHeight');
           currentX = +xE.value; currentY = +yE.value;
           break;
         default: return; // Should not happen
      }

      if(mode==='resize'){
        const aspectRatio = aspectRatios[activeImage];
        if (aspectRatio) {
             // Calculate potential new width based on mouse position and offset
            let potentialNewWidth = (mx + offsetX) - currentX;

             // Clamp potential width to minimum size
             if (potentialNewWidth < minImageSize) {
                 potentialNewWidth = minImageSize;
             }

            // Calculate the corresponding new height based on aspect ratio
            let newHeight = potentialNewWidth / aspectRatio;

            // Clamp new height to minimum size as well, recalculating width if needed
            if (newHeight < minImageSize) {
                 newHeight = minImageSize;
                 potentialNewWidth = newHeight * aspectRatio; // Recalculate width based on clamped height
            }

             // Update input values
             wE.value = Math.round(potentialNewWidth);
             hE.value = Math.round(newHeight);

        } else {
             // If aspect ratio is not known, just resize both freely (fallback)
             let newWidth = (mx + offsetX) - currentX;
             let newHeight = (my + offsetY) - currentY;
             wE.value = Math.max(minImageSize, Math.round(newWidth));
             hE.value = Math.max(minImageSize, Math.round(newHeight));
        }

      } else if (mode==='drag'){
        xE.value = Math.round(mx - offsetX);
        yE.value = Math.round(my - offsetY);
      }
      drawCard(); // Draw continuously during drag/resize
    });

      // Clear any existing timeout before setting a new one
      if (hideHandlesTimeout) {
        clearTimeout(hideHandlesTimeout);
      }

      // Only set timeout if an image was actively dragged or resized
      if (activeImage && mode) {
         hideHandlesTimeout = setTimeout(() => {
           activeImage = null; // Deselect the image
           mode = ''; // Reset mode
           drawCard(); // Redraw to remove handles
           hideHandlesTimeout = null; // Clear timeout ID
         }, 3000); // 3000 milliseconds = 3 seconds
      } else {
        // If pointerup happened without drag/resize (e.g., just a click that selected an image)
        // the activeImage is already set in pointerdown, and drawCard was called.
        // We still want the handles to disappear after a delay.
         if (activeImage) { // If an image is currently selected
             hideHandlesTimeout = setTimeout(() => {
               activeImage = null; // Deselect the image
               mode = ''; // Reset mode
               drawCard(); // Redraw to remove handles
               hideHandlesTimeout = null; // Clear timeout ID
             }, 3000); // 3000 milliseconds = 3 seconds
         }
      }

      // If only a click happened, pointerdown already called drawCard.
    });

        } else {
             console.error("Preloaded icon.png has invalid dimensions.");
             aspectRatios.icon = undefined;
        }
    };
    tempIconLoader.onerror = function() {
        console.error("Failed to preload icon.png");
        aspectRatios.icon = undefined;
        // If icon option is selected and it failed to load, hide loading
        if (document.getElementById('newOption').value === 'icon' && !customIcon.src) {
             hideLoading();
             drawCard(); // Draw without the icon
        }
    };
    tempIconLoader.crossOrigin = "anonymous"; // Needed if icon.png is on a different origin
    tempIconLoader.src = 'icon.png';


    Promise.race([document.fonts.ready,new Promise(r=>setTimeout(r,5000))]).then(()=>{
      loadBaseCard(); populateBlankCardDropdown();
       // If the icon option is already selected on page load, the tempIconLoader.onload will handle drawing.
       // If any other images need loading from applyCardState, their handlers will draw.
       // An initial draw might be needed if no images are loading from state or default icon isn't needed immediately.
       // applyCardState handles the final draw logic based on loading status.
    });

    setTimeout(()=>{
      hideLoading();
      console.warn("로딩 오버레이 강제 해제 (디버깅)");
    },30000); // Increased timeout for safety


    // Add event listener to canvas to clear handles on click outside an image
    canvas.addEventListener('click', (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left;
        const my = e.clientY - r.top;

        // Check if the click is within the bounds of any image with handles
        const isClickInsideImage = [
            activeImage === 'flag' && customFlag.complete && customFlag.src ? { name: 'flag', x: +document.getElementById('flagX').value, y: +document.getElementById('flagY').value, width: +document.getElementById('flagUploadWidth').value, height: +document.getElementById('flagUploadHeight').value } : null,
            activeImage === 'season' && customSeason.complete && customSeason.src ? { name: 'season', x: +document.getElementById('seasonX').value, y: +document.getElementById('seasonY').value, width: +document.getElementById('seasonUploadWidth').value, height: +document.getElementById('seasonUploadHeight').value } : null,
            activeImage === 'photo' && customPhoto.complete && customPhoto.src ? { name: 'photo', x: +document.getElementById('photoX').value, y: +document.getElementById('photoY').value, width: +document.getElementById('photoWidth').value, height: +document.getElementById('photoHeight').value } : null,
            activeImage === 'icon' && customIcon.complete && customIcon.src && document.getElementById('newOption').value === 'icon' ? { name: 'icon', x: +document.getElementById('iconX').value, y: +document.getElementById('iconY').value, width: +document.getElementById('iconWidth').value, height: +document.getElementById('iconHeight').value } : null,
        ].some(p => p && mx >= p.x && mx <= p.x + p.width && my >= p.y && my <= p.y + p.height);

        // If there's an active image and the click was outside of it (and not on a handle which pointerdown handles)
        if (activeImage && !isClickInsideImage) {
             // Clear the timeout if one is pending, and immediately remove handles
             if (hideHandlesTimeout) {
                 clearTimeout(hideHandlesTimeout);
                 hideHandlesTimeout = null;
             }
            activeImage = null;
            mode = '';
            drawCard();
        }
    });


  </script>
  <script type="module">
    import { db, collection, addDoc } from './firebase.js'; // Ensure firebase.js is correctly configured

    const shareBtn = document.getElementById('share-btn');
    let isSharing = false;

    shareBtn.addEventListener('click', async () => {
      if (isSharing) return;

      const last = localStorage.getItem('lastShareTime');
      if (last && Date.now() - last < 60_000) {
        alert('잠시 후에 다시 공유해 주세요.');
        return;
      }

      if (!confirm('정말 이 카드를 공유하시겠습니까?')) {
        return;
      }

      isSharing = true;
      shareBtn.disabled = true;
      const txt = shareBtn.textContent;
      shareBtn.textContent = '공유 중…';

      const title = document.getElementById('cardTitleInput').value.trim();
      const canvasElem = document.getElementById('cardCanvas');
      const imageUrl = canvasElem.toDataURL('image/png');

      if (!title) {
        alert('제목을 입력해주세요!');
        isSharing = false;
        shareBtn.disabled = false;
        shareBtn.textContent = txt;
        return;
      }

      // Temporarily hide handles before capturing image for sharing
      const tmpActiveImage = activeImage;
      const tmpMode = mode;
      activeImage = null;
      mode = '';
      drawCard(); // Redraw without handles

      // Clear any pending hide handles timeout so handles don't reappear before capture
       if (hideHandlesTimeout) {
          clearTimeout(hideHandlesTimeout);
          hideHandlesTimeout = null;
       }

      // Use a small delay to ensure canvas is redrawn before capture
      setTimeout(async () => {
           try {
             await addDoc(collection(db, 'cards'), {
               title,
               imageUrl,
               createdAt: new Date()
             });
             alert('카드가 성공적으로 공유되었습니다!');
             localStorage.setItem('lastShareTime', Date.now());
           } catch (e) {
             console.error('카드 저장 실패:', e);
             alert('카드 저장에 실패했습니다. 잠시 후 다시 시도해 주세요.');
           } finally {
             // Restore active image state and mode, and redraw
             activeImage = tmpActiveImage;
             mode = tmpMode;
             drawCard();

              // Re-enable button after a delay regardless of success/failure
             setTimeout(() => {
               isSharing = false;
               shareBtn.disabled = false;
               shareBtn.textContent = txt;
             }, 5000); // Short delay after success/failure before re-enabling
           }
      }, 50); // 50ms delay

    });
  </script>
  <button
    id="share-fab"
    data-tooltip="게시판에 공유하기"
    title="게시판에 공유하기"
  >
    공유
  </button>
  <script>
    // 기존 share-btn 로직 바로 아래에 추가
    const shareFab = document.getElementById('share-fab');
    shareFab.addEventListener('click', () => {
      document.getElementById('share-btn').click();
    });
  </script>
</body>
