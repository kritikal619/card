    /* 기본 레이아웃 */
    html, body {
      margin: 0; 
      padding: 0;
      height: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 60px; /* fixed-top navbar 높이 고려 */
      overflow-x: hidden; /* 가로 스크롤 방지 */
    }
    .main-content {
      flex: 1;
    }

    /* 네비게이션 바 */
    #navbar {
      background: #73685d;
      padding: 0.3rem 1rem;
    }

    /* 주황색 배너 영역 (네비게이션 바 바로 아래) */
    #banner {
      background-color: #FFA500; /* 주황색 배경 */
      color: #FFFFFF;           /* 흰색 텍스트 */
      text-align: center;
      padding: 15px 0;
      font-size: 1.2rem;
      font-weight: bold;
    }
    #banner a {
      color: #FFFFFF; /* 링크 텍스트 흰색 */
      text-decoration: none;
      cursor: pointer;
    }
    #banner a:hover {
      text-decoration: underline;
    }

    /* 에디터/미리보기 스타일 */
    .editor, .preview {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    /* Canvas */
    canvas {
      border: 2px solid #ddd;
      margin-top: 10px;
      background: white;
      cursor: default;
      width: 100%;
      height: auto;
      touch-action: none; /* 터치 드래그 처리 */
    }

    /* 로딩 오버레이 */
    #loadingOverlay {
      position: fixed;
      top: 0; 
      left: 0;
      width: 100%; 
      height: 100%;
      background-color: rgba(128,128,128,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #loadingOverlay img {
      width: 100px;
    }

    /* 폼 요소 */
    .form-group {
      margin-bottom: 15px;
    }
    label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 5px;
    }
    .coord-inputs {
      display: flex; 
      gap: 5px; 
      margin-top: 5px;
    }
    .coord-inputs input {
      width: 70px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    /* 삭제 버튼의 크기를 줄이기 위한 스타일 */
    .delete-btn {
      padding: 5px 10px;
      font-size: 0.8rem;
      margin-top: 5px;
    }
    fieldset {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 15px;
    }
    fieldset legend {
      font-size: 1rem;
      font-weight: bold;
      padding: 0 5px;
    }

    /* 반응형 레이아웃 */
    @media (min-width: 769px) {
      .custom-container {
        display: flex;
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .editor {
        width: 350px;
        overflow-y: auto;
        max-height: calc(100vh - 80px);
      }
      .preview {
        position: sticky; /* PC에서는 상단 고정 */
        top: 80px;
      }
    }
    @media (max-width: 768px) {
      .custom-container {
        display: block;
        padding: 0 15px;
      }
      .editor {
        margin-bottom: 180px;
      }
    }

    /* 푸터 */
    footer.footer {
      background: #f8f9fa;
      padding: 15px;
      text-align: center;
      font-size: 0.9rem;

    /* PIP 미리보기 창 (애니메이션 효과 및 둥근 모서리 적용) */
    #pipPreview {
      position: fixed;
      top: 10px;
      right: 10px;
      border: 2px solid #ddd;
      background: white;
      padding: 5px;
      z-index: 10000;
      /* 원본 캔버스와 동일한 비율로 축소 (예: 30%) */
      transform: scale(0.3);
      transform-origin: top right;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease-in-out;
      border-radius: 10px; /* 둥근 모서리 */
      overflow: hidden;   /* 내부 내용도 둥글게 */

  <script>
    // -------------------------------
    //  전역 변수 & 초기 세팅
    // -------------------------------
    const totalImages = 255;
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    let cardFileName = "card";

    // PIP 캔버스 (원본 복사)
    const pipCanvas = document.getElementById('pipCanvas');
    const pipCtx = pipCanvas.getContext('2d');

    // 모바일 깜빡임/겹침 방지: 캔버스 크기를 한 번만 설정
    let canvasWidth = 300;
    let canvasHeight = 300;
    if (window.innerWidth < 768) {
      canvasWidth = Math.floor(window.innerWidth * 0.8);
      canvasHeight = Math.floor(window.innerWidth * 0.8);
    }
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    pipCanvas.width = canvasWidth;
    pipCanvas.height = canvasHeight;

    // 로딩 오버레이
    function showLoading() {
      document.getElementById('loadingOverlay').style.display = "flex";
    }
    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = "none";
    }

    // -------------------------------
    //  이미지 객체 (CORS 문제 방지를 위해 crossOrigin 설정)
    // -------------------------------
    let baseCard = new Image();
    baseCard.crossOrigin = "anonymous";
    let customFlag = new Image();
    customFlag.crossOrigin = "anonymous";
    let customSeason = new Image();
    customSeason.crossOrigin = "anonymous";
    let customPhoto = new Image();
    customPhoto.crossOrigin = "anonymous";

    // -------------------------------
    //  파일 이름
    // -------------------------------
    function getFileName(number) {
      return `image(${number}).png`;
    }

    // -------------------------------
    //  빈카드 목록 생성
    // -------------------------------
    function populateBlankCardDropdown() {
      const select = document.getElementById('blankCardSelect');
      select.innerHTML = '';
      for (let i = 1; i <= totalImages; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.setAttribute(
          'data-content',
          `<img src="Blank/${getFileName(i)}" style="width:30px; height:auto; vertical-align:middle;"> Card ${i}`
        );
        if(i === 255) option.selected = true;
        select.appendChild(option);
      }
      $('.selectpicker').selectpicker('refresh');

      // 빈카드 선택 시 카드 로드
      select.addEventListener('change', function() {
        const cardNum = select.value;
        showLoading();
        baseCard.src = `Blank/${getFileName(cardNum)}`;
        baseCard.onload = function() {
          hideLoading();
          drawCard();
        };
      });
    }

    // -------------------------------
    //  기본 카드 로드
    // -------------------------------
    function loadBaseCard() {
      showLoading();
      baseCard.src = `Blank/${getFileName(255)}`;
      baseCard.onload = function() {
        hideLoading();
        drawCard();
      };
    }

    // -------------------------------
    //  이미지 업로드
    // -------------------------------
    document.getElementById('flagUploadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        showLoading();
        const reader = new FileReader();
        reader.onload = function(evt) {
          customFlag.onload = function() {
            hideLoading();
            drawCard();
          };
          customFlag.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('seasonUploadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        showLoading();
        const reader = new FileReader();
        reader.onload = function(evt) {
          customSeason.onload = function() {
            hideLoading();
            drawCard();
          };
          customSeason.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('photoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        showLoading();
        const reader = new FileReader();
        reader.onload = function(evt) {
          customPhoto.onload = function() {
            hideLoading();
            drawCard();
          };
          customPhoto.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // -------------------------------
    //  업로드한 이미지 삭제 함수
    // -------------------------------
    function removeFlag() {
      customFlag.src = "";
      document.getElementById('flagUploadInput').value = "";
      drawCard();
    }
    function removeSeason() {
      customSeason.src = "";
      document.getElementById('seasonUploadInput').value = "";
      drawCard();
    }
    function removePhoto() {
      customPhoto.src = "";
      document.getElementById('photoInput').value = "";
      drawCard();
    }

    // -------------------------------
    //  카드 그리기
    // -------------------------------
    function drawCard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. 빈카드 그리기
  if (baseCard.complete && baseCard.src) {
    ctx.drawImage(baseCard, 0, 0, canvas.width, canvas.height);
  }

  // 2. 미니 페이스온 그리기 (빈카드 바로 위)
  if (customPhoto.complete && customPhoto.src) {
    let photoProps = {
      x: parseInt(document.getElementById('photoX').value),
      y: parseInt(document.getElementById('photoY').value),
      width: parseInt(document.getElementById('photoWidth').value),
      height: parseInt(document.getElementById('photoHeight').value)
    };
    ctx.drawImage(customPhoto, photoProps.x, photoProps.y, photoProps.width, photoProps.height);
    if(activeImage === 'photo') drawHandles(photoProps);
  }

  // 3. 국기 그리기
  if (customFlag.complete && customFlag.src) {
    let flagProps = {
      x: parseInt(document.getElementById('flagX').value),
      y: parseInt(document.getElementById('flagY').value),
      width: parseInt(document.getElementById('flagUploadWidth').value),
      height: parseInt(document.getElementById('flagUploadHeight').value)
    };
    ctx.drawImage(customFlag, flagProps.x, flagProps.y, flagProps.width, flagProps.height);
    if(activeImage === 'flag') drawHandles(flagProps);
  }

  // 4. 시즌 그리기
  if (customSeason.complete && customSeason.src) {
    let seasonProps = {
      x: parseInt(document.getElementById('seasonX').value),
      y: parseInt(document.getElementById('seasonY').value),
      width: parseInt(document.getElementById('seasonUploadWidth').value),
      height: parseInt(document.getElementById('seasonUploadHeight').value)
    };
    ctx.drawImage(customSeason, seasonProps.x, seasonProps.y, seasonProps.width, seasonProps.height);
    if(activeImage === 'season') drawHandles(seasonProps);
  }

  // 5. 텍스트 그리기 (오버롤, 포지션, 선수 이름)
  drawText();

  // PIP 캔버스 업데이트 (보일 때)
  if(document.getElementById('pipPreview').style.opacity === "1") {
    updatePipCanvas();
  }
}

    // -------------------------------
    //  텍스트 그리기
    // -------------------------------
    function drawText() {
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 4;

      // 오버롤
      ctx.fillStyle = document.getElementById('ovrColor').value;
      ctx.font = `bold ${document.getElementById('ovrFontSize').value}px ${document.getElementById('ovrFont').value}`;
      ctx.fillText(
        document.getElementById('ovr').value,
        parseInt(document.getElementById('ovrX').value),
        parseInt(document.getElementById('ovrY').value)
      );

      // 포지션
      ctx.fillStyle = document.getElementById('posColor').value;
      ctx.font = `bold ${document.getElementById('posFontSize').value}px ${document.getElementById('posFont').value}`;
      ctx.fillText(
        document.getElementById('position').value,
        parseInt(document.getElementById('posX').value),
        parseInt(document.getElementById('posY').value)
      );

      // 선수 이름
      ctx.fillStyle = document.getElementById('nameColor').value;
      ctx.font = `${document.getElementById('nameFontSize').value}px ${document.getElementById('nameFont').value}`;
      ctx.fillText(
        document.getElementById('playerName').value,
        parseInt(document.getElementById('nameX').value),
        parseInt(document.getElementById('nameY').value)
      );

      ctx.restore();
    }

    // -------------------------------
    //  드래그/리사이즈 표시
    // -------------------------------
    function drawHandles(props) {
      ctx.save();
      ctx.setLineDash([5, 3]);
      ctx.strokeStyle = "red";
      ctx.lineWidth = 2;
      ctx.strokeRect(props.x, props.y, props.width, props.height);

      // 오른쪽 하단 조절점
      const handleSize = 8;
      ctx.fillStyle = "red";
      ctx.fillRect(
        props.x + props.width - handleSize,
        props.y + props.height - handleSize,
        handleSize, handleSize
      );
      ctx.restore();
    }

    // -------------------------------
    //  캔버스 내 이미지 드래그/리사이즈
    // -------------------------------
    let activeImage = null;
    let mode = '';
    let offsetX = 0, offsetY = 0;

    canvas.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      function checkImage(img, getProps) {
        if(img.complete && img.src) {
          let props = getProps();
          // 리사이즈 핸들 (오른쪽 하단)
          if(
            mx >= props.x + props.width - 10 && mx <= props.x + props.width + 10 &&
            my >= props.y + props.height - 10 && my <= props.y + props.height + 10
          ) {
            activeImage = props.name;
            mode = 'resize';
            offsetX = (props.x + props.width) - mx;
            offsetY = (props.y + props.height) - my;
            return true;
          }
          // 이미지 내부 (드래그)
          if(mx >= props.x && mx <= props.x + props.width &&
             my >= props.y && my <= props.y + props.height) {
            activeImage = props.name;
            mode = 'drag';
            offsetX = mx - props.x;
            offsetY = my - props.y;
            return true;
          }
        }
        return false;
      }

      // 순서: 국기 → 시즌 → 미니 페이스온
      if(checkImage(customFlag, () => ({
        x: parseInt(document.getElementById('flagX').value),
        y: parseInt(document.getElementById('flagY').value),
        width: parseInt(document.getElementById('flagUploadWidth').value),
        height: parseInt(document.getElementById('flagUploadHeight').value),
        name: 'flag'
      }))) return;

      if(checkImage(customSeason, () => ({
        x: parseInt(document.getElementById('seasonX').value),
        y: parseInt(document.getElementById('seasonY').value),
        width: parseInt(document.getElementById('seasonUploadWidth').value),
        height: parseInt(document.getElementById('seasonUploadHeight').value),
        name: 'season'
      }))) return;

      if(checkImage(customPhoto, () => ({
        x: parseInt(document.getElementById('photoX').value),
        y: parseInt(document.getElementById('photoY').value),
        width: parseInt(document.getElementById('photoWidth').value),
        height: parseInt(document.getElementById('photoHeight').value),
        name: 'photo'
      }))) return;

      activeImage = null;
    });

    canvas.addEventListener('pointermove', function(e) {
      if(!activeImage) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      if(activeImage === 'flag') {
        let xElem = document.getElementById('flagX');
        let yElem = document.getElementById('flagY');
        let wElem = document.getElementById('flagUploadWidth');
        let hElem = document.getElementById('flagUploadHeight');

        if(mode === 'resize') {
          let newW = mx - parseInt(xElem.value) + offsetX;
          if(newW < 10) newW = 10;
          wElem.value = newW;
          hElem.value = newW;
        } else if(mode === 'drag') {
          xElem.value = mx - offsetX;
          yElem.value = my - offsetY;
        }
      }
      else if(activeImage === 'season') {
        let xElem = document.getElementById('seasonX');
        let yElem = document.getElementById('seasonY');
        let wElem = document.getElementById('seasonUploadWidth');
        let hElem = document.getElementById('seasonUploadHeight');

        if(mode === 'resize') {
          let newW = mx - parseInt(xElem.value) + offsetX;
          if(newW < 10) newW = 10;
          wElem.value = newW;
          hElem.value = newW;
        } else if(mode === 'drag') {
          xElem.value = mx - offsetX;
          yElem.value = my - offsetY;
        }
      }
      else if(activeImage === 'photo') {
        let xElem = document.getElementById('photoX');
        let yElem = document.getElementById('photoY');
        let wElem = document.getElementById('photoWidth');
        let hElem = document.getElementById('photoHeight');

        if(mode === 'resize') {
          let newW = mx - parseInt(xElem.value) + offsetX;
          if(newW < 10) newW = 10;
          wElem.value = newW;
          hElem.value = newW;
        } else if(mode === 'drag') {
          xElem.value = mx - offsetX;
          yElem.value = my - offsetY;
        }
      }
      drawCard();
    });

    canvas.addEventListener('pointerup', function(e) {
      activeImage = null;
      canvas.releasePointerCapture(e.pointerId);
    });

    // -------------------------------
    //  이미지 다운로드 (PNG) 기능
    // -------------------------------
    function downloadCardImage() {
      const tempActive = activeImage;
      activeImage = null;
      drawCard();
      setTimeout(() => {
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.href = dataURL;
        link.download = cardFileName + '.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        activeImage = tempActive;
        drawCard();
      }, 100);
    }

    // -------------------------------
    //  JSON 내보내기 (편집 상태 저장) 기능
    // -------------------------------
    function downloadCardState() {
      const cardState = {
        blankCard: document.getElementById('blankCardSelect').value,
        ovr: {
          value: document.getElementById('ovr').value,
          x: document.getElementById('ovrX').value,
          y: document.getElementById('ovrY').value,
          fontSize: document.getElementById('ovrFontSize').value,
          font: document.getElementById('ovrFont').value,
          color: document.getElementById('ovrColor').value
        },
        position: {
          value: document.getElementById('position').value,
          x: document.getElementById('posX').value,
          y: document.getElementById('posY').value,
          font: document.getElementById('posFont').value,
          fontSize: document.getElementById('posFontSize').value,
          color: document.getElementById('posColor').value
        },
        playerName: {
          value: document.getElementById('playerName').value,
          x: document.getElementById('nameX').value,
          y: document.getElementById('nameY').value,
          font: document.getElementById('nameFont').value,
          fontSize: document.getElementById('nameFontSize').value,
          color: document.getElementById('nameColor').value
        },
        flag: {
          x: document.getElementById('flagX').value,
          y: document.getElementById('flagY').value,
          width: document.getElementById('flagUploadWidth').value,
          height: document.getElementById('flagUploadHeight').value,
          src: customFlag.src
        },
        season: {
          x: document.getElementById('seasonX').value,
          y: document.getElementById('seasonY').value,
          width: document.getElementById('seasonUploadWidth').value,
          height: document.getElementById('seasonUploadHeight').value,
          src: customSeason.src
        },
        photo: {
          x: document.getElementById('photoX').value,
          y: document.getElementById('photoY').value,
          width: document.getElementById('photoWidth').value,
          height: document.getElementById('photoHeight').value,
          src: customPhoto.src
        }
      };

      const json = JSON.stringify(cardState, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'cardState.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    // -------------------------------
    //  JSON 불러오기 (편집 상태 복원) 기능
    // -------------------------------
    document.getElementById('jsonLoadInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          try {
            const state = JSON.parse(evt.target.result);
            applyCardState(state);
          } catch (err) {
            console.error('JSON 파싱 오류:', err);
          }
        };
        reader.readAsText(file);
      }
    });

    // JSON 데이터를 폼에 반영하는 함수
    function applyCardState(state) {
      document.getElementById('blankCardSelect').value = state.blankCard;
      $('.selectpicker').selectpicker('refresh');
      showLoading();
      baseCard.src = `Blank/${getFileName(state.blankCard)}`;
      baseCard.onload = function() {
        hideLoading();
        drawCard();
      };

      document.getElementById('ovr').value = state.ovr.value;
      document.getElementById('ovrX').value = state.ovr.x;
      document.getElementById('ovrY').value = state.ovr.y;
      document.getElementById('ovrFontSize').value = state.ovr.fontSize;
      document.getElementById('ovrFont').value = state.ovr.font;
      document.getElementById('ovrColor').value = state.ovr.color;

      document.getElementById('position').value = state.position.value;
      document.getElementById('posX').value = state.position.x;
      document.getElementById('posY').value = state.position.y;
      document.getElementById('posFont').value = state.position.font;
      document.getElementById('posFontSize').value = state.position.fontSize;
      document.getElementById('posColor').value = state.position.color;

      document.getElementById('playerName').value = state.playerName.value;
      document.getElementById('nameX').value = state.playerName.x;
      document.getElementById('nameY').value = state.playerName.y;
      document.getElementById('nameFont').value = state.playerName.font;
      document.getElementById('nameFontSize').value = state.playerName.fontSize;
      document.getElementById('nameColor').value = state.playerName.color;

      document.getElementById('flagX').value = state.flag.x;
      document.getElementById('flagY').value = state.flag.y;
      document.getElementById('flagUploadWidth').value = state.flag.width;
      document.getElementById('flagUploadHeight').value = state.flag.height;
      customFlag.src = state.flag.src;

      document.getElementById('seasonX').value = state.season.x;
      document.getElementById('seasonY').value = state.season.y;
      document.getElementById('seasonUploadWidth').value = state.season.width;
      document.getElementById('seasonUploadHeight').value = state.season.height;
      customSeason.src = state.season.src;

      document.getElementById('photoX').value = state.photo.x;
      document.getElementById('photoY').value = state.photo.y;
      document.getElementById('photoWidth').value = state.photo.width;
      document.getElementById('photoHeight').value = state.photo.height;
      customPhoto.src = state.photo.src;

      drawCard();
    }

    // -------------------------------
    //  PIP 캔버스 업데이트
    // -------------------------------
    function updatePipCanvas() {
      pipCtx.clearRect(0, 0, pipCanvas.width, pipCanvas.height);
      pipCtx.drawImage(canvas, 0, 0, pipCanvas.width, pipCanvas.height);
    }

    // -------------------------------
    //  에디터 내 모든 input, select 변경 시 미리보기 바로 업데이트
    // -------------------------------
    document.querySelectorAll('.editor input, .editor select').forEach(el => {
      el.addEventListener('input', drawCard);
    });

    // -------------------------------
    //  IntersectionObserver (PIP 보이기/숨기기)
    // -------------------------------
    const previewElem = document.querySelector('.preview');
    const pipContainer = document.getElementById('pipPreview');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting) {
          pipContainer.style.opacity = "0";
          pipContainer.style.pointerEvents = "none";
        } else {
          pipContainer.style.opacity = "1";
          pipContainer.style.pointerEvents = "auto";
          updatePipCanvas();
        }
      });
    }, { threshold: 0.1 });

    observer.observe(previewElem);

    // -------------------------------
    //  폰트 로딩 후 초기화
    // -------------------------------
    Promise.race([
      document.fonts.ready,
      new Promise(resolve => setTimeout(resolve, 5000))
    ]).then(() => {
      loadBaseCard();             // 기본 카드 로드
      populateBlankCardDropdown(); // 빈카드 목록 채우기
    });

    // -------------------------------
    //  디버깅용: 로딩 오버레이 강제 해제
    // -------------------------------
    setTimeout(() => {
      hideLoading();
      console.warn("로딩 오버레이 강제 해제 (디버깅)");
    }, 10000);
  </script>
</body>
