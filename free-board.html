<script type="module">
  import { db } from './firebase.js';
  import {
    collection,
    query,
    orderBy,
    onSnapshot,
    doc,
    updateDoc,
    increment,
    addDoc, 
    serverTimestamp, 
    where,
    getDoc // Added for fetching parent comment author
  } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js';

  const freeBoardListElement = document.getElementById('free-board-list');
  const postsCollectionRef = collection(db, 'freeBoardPosts');
  // Comments will be stored in 'freeBoardComments' as per original free-board.html logic
  const commentsCollectionRef = collection(db, 'freeBoardComments'); 

  const notificationBell = document.getElementById('notification-bell');
  const notificationCountEl = document.getElementById('notification-count');
  const notificationListEl = document.getElementById('notification-list');
  
  let currentUserNickname = localStorage.getItem('currentUserNickname');
  if (!currentUserNickname) {
    currentUserNickname = prompt("알림 및 댓글 작성을 위한 닉네임을 입력해주세요 (예: user123):") || "guest" + Math.floor(Math.random() * 1000);
    localStorage.setItem('currentUserNickname', currentUserNickname);
  }
  console.log(`Current user for notifications & comments: ${currentUserNickname}`);

  function escapeHTML(str) {
    if (str === null || str === undefined) return '';
    return str.toString().replace(/[&<>'"/]/g, s => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;' }[s]
    ));
  }

  // --- Notification Functions (from card-board-modified-v2.html) ---
  async function createNotification(type, postId, commentId, actorNickname, actorUserId, recipientUserId, commentTextPreview, postTitle) {
    if (!recipientUserId || recipientUserId === actorUserId) { 
        console.log("Skipping self-notification or no recipient.");
        return;
    }
    try {
      await addDoc(collection(db, 'notifications'), {
        recipientUserId: recipientUserId, 
        actorNickname: actorNickname,     
        actorUserId: actorUserId,         
        type: type,                     
        postId: postId, // Changed from cardId to postId
        commentId: commentId,           
        commentTextPreview: commentTextPreview.substring(0, 50) + (commentTextPreview.length > 50 ? '...' : ''),
        postTitle: postTitle,        
        createdAt: serverTimestamp(),
        isRead: false,
        link: `#post-item-${postId}` // Link to the post item
      });
      console.log(`Notification created for ${recipientUserId} about action by ${actorNickname} on post ${postId}`);
    } catch (error) {
      console.error('Error creating notification:', error);
    }
  }

  async function loadUserNotifications(userId) {
    if (!userId) return;
    const q = query(
      collection(db, 'notifications'), 
      where('recipientUserId', '==', userId),
      orderBy('createdAt', 'desc')
    );

    onSnapshot(q, (snapshot) => {
      notificationListEl.innerHTML = '';
      let unreadCount = 0;
      if (snapshot.empty) {
        notificationListEl.innerHTML = '<p>새 알림이 없습니다.</p>';
        notificationCountEl.textContent = '0';
        notificationCountEl.style.display = 'none';
        return;
      }
      snapshot.forEach(docSnap => {
        const notification = docSnap.data();
        if (!notification.isRead) {
          unreadCount++;
        }
        const item = document.createElement('div');
        item.className = `notification-item ${notification.isRead ? 'is-read' : ''}`;
        item.dataset.notificationId = docSnap.id;
        item.innerHTML = `
          <div class="notification-text"><strong>${escapeHTML(notification.actorNickname)}</strong>님이 ${notification.type === 'new_reply_to_comment' ? '회원님의 댓글에 답글을 남겼습니다' : `${escapeHTML(notification.postTitle)}에 댓글을 남겼습니다`}: ${escapeHTML(notification.commentTextPreview)}</div>
          <div class="notification-timestamp">${notification.createdAt ? new Date(notification.createdAt.seconds * 1000).toLocaleString() : ''}</div>
        `;
        item.addEventListener('click', async () => {
          if (!notification.isRead) {
            await updateDoc(doc(db, 'notifications', docSnap.id), { isRead: true });
          }
          notificationListEl.style.display = 'none'; 
          // Attempt to scroll to the post
          const targetPostElement = document.getElementById(`post-item-${notification.postId}`);
          if (targetPostElement) {
            targetPostElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Optionally, expand the comments section if it's for a comment
            const commentsSection = targetPostElement.querySelector('.comments-section');
            const toggleBtn = targetPostElement.querySelector('.toggle-comments-btn');
            if (commentsSection && commentsSection.style.display === 'none' && toggleBtn) {
                toggleBtn.click();
            }
          } else {
            alert(`알림: ${item.querySelector('.notification-text').textContent}\n(게시글을 찾을 수 없습니다. 페이지를 새로고침 해보세요.)`);
          }
        });
        notificationListEl.appendChild(item);
      });
      notificationCountEl.textContent = unreadCount.toString();
      notificationCountEl.style.display = unreadCount > 0 ? 'inline-block' : 'none';
    }, error => {
      console.error("Error loading notifications: ", error);
      notificationListEl.innerHTML = '<p>알림을 불러오는데 실패했습니다.</p>';
    });
  }

  notificationBell.addEventListener('click', (e) => {
    e.stopPropagation();
    const isHidden = notificationListEl.style.display === 'none';
    if (isHidden) {
      notificationListEl.style.display = 'block';
      loadUserNotifications(currentUserNickname); 
    } else {
      notificationListEl.style.display = 'none';
    }
  });
  document.addEventListener('click', (e) => {
    if (!notificationBell.contains(e.target) && !notificationListEl.contains(e.target)) {
        notificationListEl.style.display = 'none';
    }
  });
  // --- End Notification Functions ---

  // --- Enhanced Comment Functions (adapted from card-board-modified-v2.html) ---
  async function addCommentToFreeBoard(postId, nickname, text, parentId = null, postData) {
    if (!nickname.trim() || !text.trim()) {
      alert('닉네임과 댓글 내용을 모두 입력해주세요.');
      return null;
    }
    // postData should contain author info, e.g., postData.nickname or postData.userId
    const postAuthorId = postData.userId || postData.nickname; // Assuming postData.userId or fallback to nickname
    const postTitle = postData.title || `게시글 '${postId.substring(0,10)}...'`;

    try {
      const commentData = {
        postId: postId, // Link comment to post
        userId: nickname, // Using nickname as userId for simplicity
        nickname: nickname,
        text: text,
        parentId: parentId, // For replies
        createdAt: serverTimestamp(),
        likes: 0, // Optional: can add like functionality to comments later
        postAuthorId: postAuthorId // Store post author ID for notifications
      };
      const commentRef = await addDoc(commentsCollectionRef, commentData);
      
      const postRefDoc = doc(db, 'freeBoardPosts', postId);
      await updateDoc(postRefDoc, { commentCount: increment(1) });
      
      console.log('Comment added with ID: ', commentRef.id);

      // Create Notification
      if (parentId) { // It's a reply
        const parentCommentRef = doc(commentsCollectionRef, parentId);
        const parentCommentSnap = await getDoc(parentCommentRef);
        if (parentCommentSnap.exists()) {
          const parentCommentData = parentCommentSnap.data();
          await createNotification('new_reply_to_comment', postId, commentRef.id, nickname, nickname, parentCommentData.userId, text, `회원님의 댓글에`);
        }
      } else { // It's a new comment on the post
        await createNotification('new_comment_on_post', postId, commentRef.id, nickname, nickname, postAuthorId, text, `게시글 '${escapeHTML(postTitle)}'`);
      }
      return commentRef.id;
    } catch (error) {
      console.error('Error adding comment or notification: ', error);
      alert('댓글 작성 또는 알림 생성에 실패했습니다.');
      return null;
    }
  }

  function renderFreeBoardComment(commentData, commentId, commentsListEl, postId, postData) {
    const commentItem = document.createElement('div');
    commentItem.className = 'comment-item';
    commentItem.dataset.commentId = commentId;
    commentItem.id = `comment-${commentId}`;

    const authorEl = document.createElement('span');
    authorEl.className = 'comment-author';
    authorEl.textContent = escapeHTML(commentData.nickname);
    if (commentData.ipAddress) { // Display IP if available (as in original)
        const ipSpan = document.createElement('span');
        ipSpan.className = 'ip-address';
        ipSpan.textContent = `(${escapeHTML(commentData.ipAddress)})`;
        authorEl.appendChild(ipSpan);
    }

    const timestampEl = document.createElement('span');
    timestampEl.className = 'comment-timestamp';
    timestampEl.textContent = commentData.createdAt ? new Date(commentData.createdAt.seconds * 1000).toLocaleString() : '';

    const textEl = document.createElement('p');
    textEl.className = 'comment-text';
    textEl.textContent = escapeHTML(commentData.text);
    
    commentItem.appendChild(authorEl);
    commentItem.appendChild(timestampEl);
    commentItem.appendChild(textEl);

    const replyButton = document.createElement('button');
    replyButton.className = 'reply-btn';
    replyButton.textContent = '답글 달기';
    replyButton.onclick = () => {
        const existingReplyForm = commentItem.querySelector('.reply-form-container');
        if (existingReplyForm) existingReplyForm.remove();

        const replyFormContainer = document.createElement('div');
        replyFormContainer.className = 'reply-form-container';
        replyFormContainer.innerHTML = `
            <input type="text" class="reply-nickname-input" placeholder="닉네임" value="${currentUserNickname}">
            <textarea class="reply-text-input" placeholder="답글 내용을 입력하세요..."></textarea>
            <button class="add-reply-btn">답글 작성</button>
        `;
        commentItem.appendChild(replyFormContainer);
        replyFormContainer.querySelector('.add-reply-btn').onclick = async () => {
            const replyNickname = replyFormContainer.querySelector('.reply-nickname-input').value;
            const replyText = replyFormContainer.querySelector('.reply-text-input').value;
            const newReplyId = await addCommentToFreeBoard(postId, replyNickname, replyText, commentId, postData);
            if (newReplyId) {
                replyFormContainer.remove(); 
            }
        };
    };
    commentItem.appendChild(replyButton);

    if (commentData.parentId) {
        commentItem.style.marginLeft = '20px'; 
        const parentCommentEl = commentsListEl.querySelector(`.comment-item[data-comment-id="${commentData.parentId}"]`);
        if (parentCommentEl) {
            let replyContainerTarget = parentCommentEl.querySelector('.reply-form-container');
            if (replyContainerTarget) {
                parentCommentEl.insertBefore(commentItem, replyContainerTarget);
            } else {
                parentCommentEl.appendChild(commentItem);
            }
        } else {
            commentsListEl.appendChild(commentItem); 
        }
    } else {
        commentsListEl.appendChild(commentItem);
    }
  }

  let commentListeners = {}; 

  function loadAndDisplayEnhancedComments(postId, commentsListEl, postData) {
    if (commentListeners[postId]) { 
      // Listener already active, maybe refresh or do nothing
      // For simplicity, not detaching and re-attaching on every toggle here
      return;
    }
    commentsListEl.innerHTML = '<p>댓글을 불러오는 중...</p>';
    const q = query(commentsCollectionRef, where('postId', '==', postId), orderBy('createdAt', 'asc'));
    
    const unsubscribe = onSnapshot(q, (snapshot) => {
      commentsListEl.innerHTML = ''; 
      if (snapshot.empty) {
        commentsListEl.innerHTML = '<p>아직 댓글이 없습니다.</p>';
        return;
      }
      const allComments = {};
      snapshot.forEach(doc => allComments[doc.id] = { id: doc.id, ...doc.data() });

      const rootComments = [];
      const replies = {}; // Store replies keyed by parentId

      for (const id in allComments) {
          const comment = allComments[id];
          if (comment.parentId) {
              if (!replies[comment.parentId]) {
                  replies[comment.parentId] = [];
              }
              replies[comment.parentId].push(comment);
          } else {
              rootComments.push(comment);
          }
      }
      
      // Function to recursively render comments and their replies
      function renderNestedComments(comment, container) {
        renderFreeBoardComment(comment, comment.id, container, postId, postData);
        // Find the actual DOM element for this comment to append replies to it
        const commentElement = container.querySelector(`.comment-item[data-comment-id="${comment.id}"]`);
        if (commentElement && replies[comment.id]) {
            replies[comment.id].sort((a,b) => a.createdAt.seconds - b.createdAt.seconds).forEach(reply => {
                renderNestedComments(reply, commentElement); // Render reply within parent's DOM element
            });
        }
      }

      rootComments.forEach(comment => {
          renderNestedComments(comment, commentsListEl);
      });

    }, (error) => {
      console.error(`Error loading comments for post ${postId}:`, error);
      if (error.code === 'failed-precondition' && error.message.includes('requires an index')) {
          const indexUrl = error.message.match(/https:\/\/console\.firebase\.google\.com[^\s]+/)?.[0];
          commentsListEl.innerHTML = `
            <div class="error-message">
              <p>댓글을 불러오는 데 실패했습니다. 필요한 Firestore 인덱스가 없습니다.</p>
              ${indexUrl ? `<p><a href="${indexUrl}" target="_blank">Firestore 콘솔에서 인덱스 생성하기</a></p>` : ''}
            </div>`;
      } else {
        commentsListEl.innerHTML = '<p>댓글을 불러오는데 실패했습니다.</p>';
      }
    });
    commentListeners[postId] = unsubscribe; 
  }
  // --- End Enhanced Comment Functions ---

  // Main logic to load posts
  const freePostsQuery = query(postsCollectionRef, orderBy('createdAt', 'desc'));
  onSnapshot(freePostsQuery, (snapshot) => {
    if (!freeBoardListElement) return;
    freeBoardListElement.innerHTML = '';
    
    // const unsubscribeFunctions = new Map(); // Already declared above for original comments, reuse or manage carefully
    // For simplicity, commentListeners map will handle comment unsubscriptions.

    snapshot.forEach(postDoc => {
      const postData = postDoc.data();
      const postId = postDoc.id;
      postData.id = postId; // Make postId available in postData for comment functions

      const postCardDiv = document.createElement('div');
      postCardDiv.className = 'post-card';
      postCardDiv.id = `post-item-${postId}`; // ID for linking notifications

      // Basic post structure (title, meta, content preview, images, stats)
      postCardDiv.innerHTML = `
        <h3 class="post-title">${escapeHTML(postData.title)}</h3>
        <p class="post-meta">
          작성자: ${escapeHTML(postData.nickname)}
          <span class="ip-address">(${escapeHTML(postData.ipAddress || 'IP 정보 없음')})</span>
          - ${postData.createdAt ? new Date(postData.createdAt.seconds * 1000).toLocaleString() : '날짜 없음'}
        </p>
        <p class="post-content-preview">${escapeHTML(postData.content)}</p>
        ${postData.imageUrls && postData.imageUrls.length > 0 ? `
          <div class="post-images">
            ${postData.imageUrls.map(url => `
              <img src="${escapeHTML(url)}" alt="Post image" class="post-image-preview">
            `).join('')}
          </div>
        ` : ''}
        <div class="post-stats">
          <span class="post-stat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span class="recommend-count">${postData.recommends || 0}</span>
          </span>
          <span class="post-stat comment-count-display">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
            <span>${postData.commentCount || 0}</span>
          </span>
        </div>
        <div class="post-detail" style="display: none;">
          <!-- Full content can be loaded here if different from preview -->
          <p>${escapeHTML(postData.content)}</p> 
          <div class="post-actions-original">
            <button class="recommend-button" data-post-id="${postId}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              추천
            </button>
          </div>
        </div>
      `;
      
      // Create and append Post Actions Footer (for comment toggle)
      const postActionsFooterDiv = document.createElement('div');
      postActionsFooterDiv.className = 'post-actions-footer';
      postActionsFooterDiv.innerHTML = `
        <div class="post-actions">
            <span class="comment-count-display">💬 ${postData.commentCount || 0}</span>
            <button class="toggle-comments-btn">댓글 보기</button>
        </div>
      `;
      postCardDiv.appendChild(postActionsFooterDiv);

      // Create and append Comments Section (initially hidden)
      const commentsSectionDiv = document.createElement('div');
      commentsSectionDiv.className = 'comments-section';
      commentsSectionDiv.style.display = 'none'; 
      commentsSectionDiv.innerHTML = `
        <div class="comments-list"></div>
        <div class="comment-form">
          <h4>새 댓글 작성</h4>
          <input type="text" class="comment-nickname-input" placeholder="닉네임" value="${currentUserNickname}">
          <textarea class="comment-text-input" placeholder="댓글을 입력하세요..."></textarea>
          <button class="add-comment-btn">댓글 작성</button>
        </div>
      `;
      postCardDiv.appendChild(commentsSectionDiv);
      freeBoardListElement.appendChild(postCardDiv);

      // Event listener for post title click to expand/collapse details
      const postTitleElement = postCardDiv.querySelector('.post-title');
      const detailSection = postCardDiv.querySelector('.post-detail');
      postTitleElement.addEventListener('click', (e) => {
        e.stopPropagation();
        detailSection.style.display = detailSection.style.display === 'none' ? 'block' : 'none';
      });

      // Image click handler (from original)
      const postImages = postCardDiv.querySelectorAll('.post-image-preview');
      postImages.forEach(img => {
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          // ... (image full view logic from original, kept as is) ...
            const fullView = document.createElement('div');
            fullView.className = 'image-full-view';
            fullView.innerHTML = `
                <div class="image-full-view-content">
                <img src="${img.src}" alt="Full size image">
                <button class="close-full-view">×</button>
                </div>
            `;
            document.body.appendChild(fullView);
            fullView.querySelector('.close-full-view').addEventListener('click', () => { fullView.remove(); });
            fullView.addEventListener('click', (ev) => { if (ev.target === fullView) { fullView.remove(); } });
        });
      });

      // Recommend functionality (from original)
      const recommendButton = postCardDiv.querySelector('.recommend-button');
      if (localStorage.getItem(`recommended_${postId}`) === 'true') {
        recommendButton.classList.add('recommended');
      }
      recommendButton.addEventListener('click', async (e) => {
        e.stopPropagation();
        const hasRecommended = localStorage.getItem(`recommended_${postId}`) === 'true';
        if (hasRecommended) {
          alert('이미 추천하셨습니다.');
          return;
        }
        try {
          await updateDoc(doc(db, 'freeBoardPosts', postId), { recommends: increment(1) });
          localStorage.setItem(`recommended_${postId}`, 'true');
          recommendButton.classList.add('recommended');
        } catch (error) {
          console.error('Error recommending post:', error);
          alert('추천 처리에 실패했습니다.');
        }
      });

      // New Comment Toggle and Form Handling
      const toggleBtn = postActionsFooterDiv.querySelector('.toggle-comments-btn');
      const commentsListEl = commentsSectionDiv.querySelector('.comments-list');
      
      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isHidden = commentsSectionDiv.style.display === 'none';
        if (isHidden) {
          commentsSectionDiv.style.display = 'block';
          toggleBtn.textContent = '댓글 숨기기';
          loadAndDisplayEnhancedComments(postId, commentsListEl, postData); // Use new comment loader
        } else {
          commentsSectionDiv.style.display = 'none';
          toggleBtn.textContent = '댓글 보기';
          // Optionally, unsubscribe from comments here if listener is active
          if (commentListeners[postId]) {
            // commentListeners[postId](); // Detach listener
            // delete commentListeners[postId];
          }
        }
      });

      const addCommentBtn = commentsSectionDiv.querySelector('.add-comment-btn');
      const nicknameInput = commentsSectionDiv.querySelector('.comment-nickname-input');
      const textInput = commentsSectionDiv.querySelector('.comment-text-input');

      addCommentBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const nickname = nicknameInput.value;
        const text = textInput.value;
        const commentId = await addCommentToFreeBoard(postId, nickname, text, null, postData);
        if (commentId) {
          textInput.value = ''; // Clear input after successful submission
          // The onSnapshot listener for comments should automatically update the list.
        }
      });
    });

    // Initial load of notifications for the current user
    loadUserNotifications(currentUserNickname);

  }, error => {
    console.error('Error fetching free board posts:', error);
    if (freeBoardListElement) freeBoardListElement.innerHTML = '<p>게시글 목록을 불러오는 데 실패했습니다.</p>';
  });

</script>
</body>
</html>
